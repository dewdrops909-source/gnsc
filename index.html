<script>
// Register service worker for offline + installability
if('serviceWorker' in navigator) {
  const sw = `
    self.addEventListener('install', e=>{ e.waitUntil(caches.open('gnsc-v1').then(c=>c.addAll([location.href]))); });
    self.addEventListener('fetch', e=>{ e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match(location.href)))); });
  `;
  const blob = new Blob([sw], {type:'application/javascript'});
  const url  = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}
// PWA manifest injected inline
const manifest = {
  name: 'GNSC Vehicle Tracker',
  short_name: 'GNSC',
  description: 'Jubilant FoodWorks · Supply Chain Vehicle Tracker',
  start_url: location.href,
  display: 'standalone',

  }]
};
const mblob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
const mlink = document.createElement('link');
mlink.rel='manifest'; mlink.href=URL.createObjectURL(mblob);
document.head.appendChild(mlink);

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700;800&display=swap');
:root{
  --bg:#0D1117;--sur:#161B22;--sur2:#1C2330;--bdr:#30363D;--bdr2:#21262D;
  --acc:#F4A228;--acd:rgba(244,162,40,.13);
  --grn:#3FB950;--gnd:rgba(63,185,80,.12);
  --blu:#58A6FF;--bld:rgba(88,166,255,.12);
  --red:#F85149;--rdd:rgba(248,81,73,.12);
  --pur:#BC8CFF;--pud:rgba(188,140,255,.12);
  --org:#F0883E;--ogd:rgba(240,136,62,.12);
  --txt:#E6EDF3;--mut:#7D8590;--dim:#4D5566;
  --r:10px;--mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:14px;overscroll-behavior:none}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.6)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}

/* ROLE GATE */
#rg{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.rg-logo{background:var(--acc);color:#000;font-family:var(--mono);font-weight:800;font-size:18px;padding:8px 16px;border-radius:8px;margin-bottom:6px}
.rg-ttl{font-size:22px;font-weight:800;margin-bottom:4px}
.rg-sub{font-size:13px;color:var(--mut);margin-bottom:28px}
.rg-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:340px}
.rg-btn{border-radius:12px;padding:18px 12px;text-align:center;cursor:pointer;border:1px solid var(--bdr);background:var(--sur);transition:transform .1s}
.rg-btn:active{transform:scale(.96)}
.rg-ic{font-size:26px;margin-bottom:5px}
.rg-nm{font-weight:700;font-size:13px}
.rg-dc{font-size:10px;color:var(--mut);margin-top:2px}
.rg-l{border-color:var(--acc)!important;background:var(--acd)!important}
.rg-w{border-color:var(--grn)!important;background:var(--gnd)!important}
.rg-t{border-color:var(--blu)!important;background:var(--bld)!important}
.rg-g{border-color:var(--pur)!important;background:var(--pud)!important}

/* HEADER */
.hdr{background:var(--sur);border-bottom:1px solid var(--bdr);padding:10px 14px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.logo{background:var(--acc);color:#000;font-family:var(--mono);font-weight:800;font-size:11px;padding:3px 7px;border-radius:5px}
.role-chip{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700}
.rc-l{background:var(--acd);color:var(--acc)}
.rc-w{background:var(--gnd);color:var(--grn)}
.rc-t{background:var(--bld);color:var(--blu)}
.rc-g{background:var(--pud);color:var(--pur)}
.live{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--grn);font-weight:700}
.dot{width:6px;height:6px;border-radius:50%;background:var(--grn);animation:pulse 1.8s infinite}

/* BANNERS */
.co-ban{background:rgba(240,136,62,.07);border-bottom:2px solid var(--org);padding:10px 14px}
.co-title{font-size:10px;font-weight:800;color:var(--org);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
.co-chip{background:var(--ogd);border:1px solid var(--org);border-radius:6px;padding:5px 9px;display:inline-flex;flex-direction:column;gap:1px;cursor:pointer}
.co-chip .cc-n{font-family:var(--mono);font-size:12px;font-weight:800;color:var(--org)}
.co-chip .cc-s{font-size:9px;color:var(--org);opacity:.8}
.cut-ban{padding:7px 14px;font-size:11px;font-weight:700;text-align:center}
.cb-ok{background:var(--gnd);color:var(--grn)}
.cb-warn{background:var(--ogd);color:var(--org)}
.cb-over{background:var(--rdd);color:var(--red);animation:blink 1.5s infinite}

/* TABS */
.tabs{display:flex;background:var(--sur);border-bottom:1px solid var(--bdr);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:50px;padding:9px 4px;text-align:center;font-size:10px;font-weight:700;color:var(--mut);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab.on{color:var(--acc);border-bottom-color:var(--acc)}
.tab-ic{font-size:13px;display:block;margin-bottom:1px}
.tb{display:inline-block;background:var(--red);color:#fff;font-size:9px;font-weight:800;padding:0 4px;border-radius:8px;min-width:14px;line-height:14px;text-align:center;margin-left:2px;vertical-align:top}

/* PAGES */
.page{display:none;padding:12px 14px;padding-bottom:80px}
.page.on{display:block}
.pg-h{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.pg-t{font-weight:800;font-size:16px}
.pg-s{font-size:11px;color:var(--mut);margin-top:2px}
.pg-time{font-family:var(--mono);font-size:10px;color:var(--mut);background:var(--sur2);padding:2px 7px;border-radius:4px}

/* CARDS */
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:13px;margin-bottom:10px}
.card-t{font-weight:700;font-size:13px;margin-bottom:11px;display:flex;align-items:center;gap:7px}
.card-ic{width:24px;height:24px;border-radius:6px;background:var(--acd);display:flex;align-items:center;justify-content:center;font-size:12px}

/* STAT GRIDS */
.sg3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:8px}
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px}
.sg5{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px}
.sc{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 10px;text-align:center}
.sc-n{font-family:var(--mono);font-size:24px;font-weight:800;line-height:1;margin-bottom:3px}
.sc-l{font-size:9px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.4px}

/* PROGRESS */
.prog{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 13px;margin-bottom:10px}
.pb{background:var(--sur2);border-radius:4px;height:6px;overflow:hidden}
.pf{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--acc),var(--grn));transition:width .5s}
.pm{display:flex;justify-content:space-between;font-size:10px;color:var(--mut);margin-top:5px}

/* ALERTS */
.al{border-radius:8px;padding:8px 12px;margin-bottom:7px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:7px}
.al-r{background:var(--rdd);border:1px solid var(--red);color:var(--red)}
.al-o{background:var(--ogd);border:1px solid var(--org);color:var(--org)}
.al-g{background:var(--gnd);border:1px solid var(--grn);color:var(--grn)}

/* SECTION HEADER */
.sec{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--mut);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.sec-b{background:var(--sur2);border:1px solid var(--bdr);padding:1px 7px;border-radius:10px;font-size:10px;color:var(--mut);font-weight:700}
.dvd{height:1px;background:var(--bdr);margin:11px 0}

/* FORMS */
.field{margin-bottom:10px}
.field label{display:block;font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;background:var(--sur2);border:1px solid var(--bdr);border-radius:7px;padding:9px 10px;color:var(--txt);font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--acc)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-p{width:100%;padding:12px;background:var(--acc);color:#000;border:none;border-radius:8px;font-weight:800;font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;margin-bottom:8px}
.btn-p:active{opacity:.85}
.btn-s{width:100%;padding:10px;background:var(--sur2);color:var(--txt);border:1px solid var(--bdr);border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;margin-bottom:7px}
.btn-d{width:100%;padding:10px;background:var(--rdd);color:var(--red);border:1px solid var(--red);border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;margin-bottom:7px}
.dt{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.db{padding:9px 6px;border-radius:7px;text-align:center;cursor:pointer;font-size:12px;font-weight:700;border:1px solid var(--bdr);background:var(--sur2);color:var(--mut)}
.db-l{border:2px solid var(--acc)!important;background:var(--acd)!important;color:var(--acc)!important}
.db-o{border:2px solid var(--blu)!important;background:var(--bld)!important;color:var(--blu)!important}
.sr{display:flex;gap:6px;margin-bottom:6px}
.sr input{flex:1;background:var(--sur2);border:1px solid var(--bdr);border-radius:7px;padding:8px 10px;color:var(--txt);font-family:'Inter',sans-serif;font-size:13px;outline:none}
.sr input:focus{border-color:var(--acc)}
.sr-rm{background:var(--rdd);color:var(--red);border:none;border-radius:6px;padding:0 9px;font-size:14px;cursor:pointer}
.add-s{width:100%;padding:7px;background:transparent;color:var(--acc);border:1px dashed var(--acc);border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-top:4px}

/* ROUTE LIST */
.rrow{display:grid;grid-template-columns:16px 1fr 100px 68px 72px;gap:6px;padding:9px 12px;border-bottom:1px solid var(--bdr2);cursor:pointer;align-items:center}
.rrow:last-child{border-bottom:none}
.rrow:active{background:var(--sur2)}
.rb{font-size:9px;font-weight:800;padding:2px 6px;border-radius:5px;white-space:nowrap}
.rb-short{background:var(--ogd);color:var(--org)}
.rb-planned{background:rgba(255,255,255,.04);color:var(--mut)}
.rb-inside{background:var(--bld);color:var(--blu)}
.rb-dock{background:var(--pud);color:var(--pur)}
.rb-loaded{background:var(--gnd);color:var(--grn)}
.rb-out{background:rgba(255,255,255,.03);color:var(--dim)}
.rb-breakdown{background:var(--rdd);color:var(--red)}

/* FILTER CHIPS */
.frow{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:10px}
.frow::-webkit-scrollbar{display:none}
.fc{padding:4px 10px;border-radius:16px;border:1px solid var(--bdr);background:var(--sur2);color:var(--mut);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.fc.on{background:var(--acd);color:var(--acc);border-color:var(--acc)}

/* POOL CHIPS */
.pc{background:var(--sur2);border:1px solid var(--bdr);border-radius:7px;padding:5px 9px;display:inline-flex;flex-direction:column;gap:1px;cursor:pointer}
.pc .pn{font-family:var(--mono);font-size:12px;font-weight:800}
.pc .ps{font-size:9px;opacity:.8}

/* MINI CHIPS */
.mc{background:var(--sur2);border:1px solid var(--bdr);border-radius:5px;padding:4px 8px;display:inline-flex;flex-direction:column;gap:1px}
.mc .mn{font-family:var(--mono);font-size:11px;font-weight:800;white-space:nowrap}
.mc .ms{font-size:8px;white-space:nowrap;opacity:.8}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:none;align-items:flex-end}
.mo.on{display:flex}
.mo-box{background:var(--sur);border-radius:16px 16px 0 0;padding:18px 14px 28px;width:100%;border-top:1px solid var(--bdr);max-height:92vh;overflow-y:auto}
.mo-hnd{width:36px;height:4px;background:var(--bdr);border-radius:2px;margin:0 auto 14px}
.mo-t{font-weight:800;font-size:15px;margin-bottom:14px}
.act-btn{width:100%;padding:13px;border:none;border-radius:8px;font-weight:800;font-size:14px;cursor:pointer;font-family:'Inter',sans-serif;margin-bottom:7px}

/* TIMELINE */
.tl{display:flex;margin-bottom:12px}
.tl-s{flex:1;text-align:center;position:relative}
.tl-s::before{content:'';position:absolute;top:8px;left:50%;width:100%;height:2px;background:var(--bdr)}
.tl-s:last-child::before{display:none}
.tl-s.done::before{background:var(--grn)}
.tl-d{width:17px;height:17px;border-radius:50%;background:var(--sur2);border:2px solid var(--bdr);margin:0 auto 3px;position:relative;z-index:1;font-size:7px;display:flex;align-items:center;justify-content:center}
.tl-s.done .tl-d{background:var(--grn);border-color:var(--grn);color:#000}
.tl-s.cur .tl-d{background:var(--acc);border-color:var(--acc);animation:pulse 1.5s infinite}
.tl-l{font-size:8px;color:var(--dim);font-weight:600}
.tl-t{font-size:7px;color:var(--mut);font-family:var(--mono)}

/* DOCK GRID */
.dg{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px}
.dtile{border:2px solid var(--bdr);border-radius:9px;padding:9px 5px;text-align:center;background:var(--sur)}
.dtile .dt-n{font-family:var(--mono);font-size:14px;font-weight:800}
.dtile .dt-v{font-size:8px;color:var(--mut);margin-top:2px}
.dtile .dt-t{font-size:9px;margin-top:1px;font-weight:700}

/* ROLE SWITCHER */
#rs{position:fixed;bottom:0;z-index:150;background:var(--sur);border-top:1px solid var(--bdr);padding:7px 12px;display:flex;align-items:center;gap:5px;overflow-x:auto;scrollbar-width:none;width:100%}
#rs::-webkit-scrollbar{display:none}
.rsb{flex-shrink:0;padding:5px 11px;border-radius:16px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--bdr);background:var(--sur2);color:var(--mut);white-space:nowrap}
.rsb:active{transform:scale(.95)}
.rsb.on{border-width:2px}
.rsb-l.on{border-color:var(--acc);background:var(--acd);color:var(--acc)}
.rsb-w.on{border-color:var(--grn);background:var(--gnd);color:var(--grn)}
.rsb-t.on{border-color:var(--blu);background:var(--bld);color:var(--blu)}
.rsb-g.on{border-color:var(--pur);background:var(--pud);color:var(--pur)}

/* FORMAT BOX */
.fmt-box{background:var(--sur2);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.fmt-hdr{font-size:10px;font-weight:800;color:var(--acc);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.fmt-eg{font-family:var(--mono);font-size:11px;line-height:2;color:var(--dim)}
.fmt-eg b{color:var(--txt)}

/* MISC */
.empty{text-align:center;padding:28px 16px;color:var(--mut)}
.empty-ic{font-size:28px;margin-bottom:7px}
.empty-t{font-size:12px}
.toast{position:fixed;bottom:68px;left:50%;transform:translateX(-50%) translateY(16px);font-weight:800;font-size:13px;padding:9px 18px;border-radius:16px;opacity:0;transition:all .25s;z-index:999;white-space:nowrap;pointer-events:none;background:var(--grn);color:#000}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--red);color:#fff}
.eta-ok{color:var(--grn)}.eta-warn{color:var(--org)}.eta-late{color:var(--red)}.eta-break{color:var(--red)}
.yday{font-size:8px;background:var(--org);color:#000;border-radius:3px;padding:1px 4px;font-weight:800;font-family:'Inter',sans-serif;vertical-align:middle;margin-left:2px}
</style>
</head>
<body>

<!-- CLEAR DATA BUTTON hidden -->
<div id="clearBar" style="display:none"></div>

<!-- GATE ALERT BANNER -->
<div id="gateBanner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:9998;background:var(--acc);padding:14px 16px;align-items:center;gap:12px;animation:blink .8s infinite"></div>

<!-- INSTALL BANNER -->
<div id="installBan" style="display:none;position:fixed;bottom:60px;left:12px;right:12px;z-index:500;background:#1C2330;border:1px solid #F4A228;border-radius:12px;padding:12px 14px;align-items:center;gap:10px;box-shadow:0 4px 24px rgba(0,0,0,.5)">
  <div style="background:#F4A228;color:#000;font-family:monospace;font-weight:800;font-size:16px;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0">G</div>
  <div style="flex:1;min-width:0"><div style="font-weight:800;font-size:13px">Add GNSC to Home Screen</div><div style="font-size:11px;color:#7D8590;margin-top:1px">Install as app — works offline</div></div>
  <button id="installBtn" style="background:#F4A228;color:#000;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap">Install</button>
  <button onclick="document.getElementById('installBan').style.display='none';localStorage.setItem('gnsc_install_dismissed','1')" style="background:transparent;border:none;color:#4D5566;font-size:18px;cursor:pointer;padding:0 4px;line-height:1">×</button>
</div>

<!-- ROLE GATE -->
<div id="rg" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 20px;position:relative;text-align:center">

  <button onclick="clearData()" title="Clear today's data, keep masters" style="position:absolute;top:14px;left:14px;background:transparent;border:1px solid var(--bdr);color:var(--dim);border-radius:6px;padding:5px 10px;font-size:9px;font-weight:700;cursor:pointer;line-height:1">🗑 Clear Data</button>
  <button onclick="clearAll()" title="Clear everything including masters" style="position:absolute;top:14px;right:14px;background:transparent;border:1px solid var(--red);color:var(--red);border-radius:6px;padding:5px 10px;font-size:9px;font-weight:700;cursor:pointer;line-height:1">⚠ Reset All</button>

  <div class="rg-logo">GNSC</div>
  <div class="rg-ttl">Vehicle Tracker</div>

<script>
'use strict';
window.onerror=function(msg,src,line,col,err){
  document.body.insertAdjacentHTML('afterbegin',`<div style="position:fixed;top:0;left:0;right:0;z-index:9999;background:#F85149;color:#fff;padding:10px 14px;font-size:12px;font-family:monospace;white-space:pre-wrap;word-break:break-all">ERROR: ${msg}\nLine: ${line}\n${err?.stack||''}</div>`);
};
window.addEventListener('unhandledrejection',e=>{
  document.body.insertAdjacentHTML('afterbegin',`<div style="position:fixed;top:0;left:0;right:0;z-index:9999;background:#F85149;color:#fff;padding:10px 14px;font-size:12px;font-family:monospace">PROMISE ERR: ${e.reason}</div>`);
});

// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
function getToday() { return new Date().toISOString().slice(0,10); }
let TODAY = getToday();

let routes         = JSON.parse(localStorage.getItem('gnsc_routes')    || '[]');
let vehicles       = JSON.parse(localStorage.getItem('gnsc_vehicles')  || '[]');
let actLog         = JSON.parse(localStorage.getItem('gnsc_actlog')    || '[]');
let loadHist       = JSON.parse(localStorage.getItem('gnsc_loadhist')  || '[]');
let dayHist        = JSON.parse(localStorage.getItem('gnsc_dayhist')   || '[]'); // [{date,vehicles,vendors:{},breakdowns:[],delayed:[],indentPlan,indentActual}]
let DOCKS          = JSON.parse(localStorage.getItem('gnsc_docks')     || 'null') || ['D1','D2','D3','D4','D5','D6','D7','D8'];
let masterVehicles = JSON.parse(localStorage.getItem('gnsc_master')    || '[]');
let masterStores   = JSON.parse(localStorage.getItem('gnsc_mstores')   || '[]');
let masterTrans    = JSON.parse(localStorage.getItem('gnsc_mtrans')    || '[]');
let masterTypes    = JSON.parse(localStorage.getItem('gnsc_mtypes')    || '["24ft","32ft","Container","LCV","Pickup","Other"]');
let masterIndent   = JSON.parse(localStorage.getItem('gnsc_indent')    || '{}');
let actualIndent   = parseInt(localStorage.getItem('gnsc_actual_indent')||'0') || 0;
let tomorrowPlan   = JSON.parse(localStorage.getItem('gnsc_tomorrow')  || '[]'); // parsed rows, not yet routes

// ─────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────
const FLOW   = ['planned','inside','dock','loaded','out'];
const SL     = {short:'Vehicle Short',planned:'Planned',inside:'In GNSC',dock:'At Dock',loaded:'Loaded',out:'Departed',breakdown:'Breakdown'};
const SI     = {short:'⚠️',planned:'⏳',inside:'🕐',dock:'🔋',loaded:'📦',out:'✅',breakdown:'🚨'};
const SC     = {short:'var(--org)',planned:'var(--dim)',inside:'var(--blu)',dock:'var(--pur)',loaded:'var(--grn)',out:'var(--dim)',breakdown:'var(--red)'};
const SBG    = {short:'var(--ogd)',planned:'rgba(255,255,255,.04)',inside:'var(--bld)',dock:'var(--pud)',loaded:'var(--gnd)',out:'rgba(255,255,255,.03)',breakdown:'var(--rdd)'};
const CUT_L  = '22:30';
const CUT_OS = '12:30';

const ROLE_TABS = {
  leader:    [{id:'dashboard',ic:'📊',lb:'OVERVIEW'},{id:'fleet',ic:'🚛',lb:'FLEET'},{id:'analytics',ic:'📈',lb:'ANALYTICS'}],
  warehouse: [{id:'whdash',ic:'📊',lb:'OVERVIEW'},{id:'docks',ic:'🔋',lb:'DOCKS'},{id:'details',ic:'📋',lb:'DETAILS'},{id:'update',ic:'🔄',lb:'UPDATE'},{id:'log',ic:'📋',lb:'LOG'}],
  transport: [{id:'dashboard',ic:'📊',lb:'OVERVIEW'},{id:'fleet',ic:'🚛',lb:'FLEET'},{id:'routes',ic:'📍',lb:'ROUTES'},{id:'vehicles',ic:'🚛',lb:'VEHICLES'},{id:'details',ic:'📋',lb:'DETAILS'},{id:'plan',ic:'📤',lb:'PLAN'},{id:'update',ic:'🔄',lb:'UPDATE'},{id:'add',ic:'➕',lb:'ADD'},{id:'masters',ic:'🗂️',lb:'MASTERS'},{id:'log',ic:'📋',lb:'LOG'}],
  gate:      [{id:'update',ic:'🛡️',lb:'GATE'}],
};

const ROLE_INFO = {
  leader:    {icon:'🎯', name:'Leader',    cls:'rc-l'},
  warehouse: {icon:'📦', name:'Warehouse', cls:'rc-w'},
  transport: {icon:'🚛', name:'Transport', cls:'rc-t'},
  gate:      {icon:'🛡️', name:'Gate',      cls:'rc-g'},
};

// ─────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────
let _ridSeq=0;
function genRId() { return 'R'+Date.now().toString(36).toUpperCase()+( ++_ridSeq).toString(36).toUpperCase(); }
let _idSeq=0;
function genId()  { return Date.now().toString(36).toUpperCase().slice(-5)+(++_idSeq).toString(36).toUpperCase()+Math.random().toString(36).slice(-2).toUpperCase(); }
function validVNum(n) { return /^[A-Z]{2}[0-9]{1,2}[A-Z0-9]{1,4}[0-9]{4}$/.test((n||'').toUpperCase().replace(/\s+/g,'')); }
function nowTime()  { const d=new Date(); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); }
function nowMins()  { return t2m(nowTime()); }
function t2m(t)     { if(!t) return 0; const p=(t||'').slice(0,5).split(':'); return +p[0]*60+ +p[1]; }
function fmtM(m)    { if(!m||m<=0) return '0m'; return m<60?m+'m':Math.floor(m/60)+'h '+(m%60)+'m'; }
function esc(s)     { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function dockN(d)   { return typeof d==='object'?d.name:d; }

// ─────────────────────────────────────────────
// FIREBASE SYNC
// ─────────────────────────────────────────────
let _fbListening=false, _ignoreNext=false;

function save() {
  const cut=new Date(); cut.setDate(cut.getDate()-30);
  const cs=cut.toISOString().slice(0,10);
  actLog  =actLog.filter(a=>!a.date||a.date>=cs);
  loadHist=loadHist.filter(h=>!h.date||h.date>=cs);
  localStorage.setItem('gnsc_routes',   JSON.stringify(routes));
  localStorage.setItem('gnsc_vehicles', JSON.stringify(vehicles));
  localStorage.setItem('gnsc_actlog',   JSON.stringify(actLog));
  localStorage.setItem('gnsc_loadhist', JSON.stringify(loadHist));
  localStorage.setItem('gnsc_dayhist',  JSON.stringify(dayHist));
  localStorage.setItem('gnsc_docks',    JSON.stringify(DOCKS));
  // Push to Firebase
  if(typeof db!=='undefined') {
    _ignoreNext=true;
    db.ref('gnsc/live').set({routes,vehicles,actLog:actLog.slice(-200),dayHist,ts:Date.now()})
      .catch(e=>console.warn('FB save:',e));
  }
}
function saveMasters() {
  localStorage.setItem('gnsc_master',   JSON.stringify(masterVehicles));
  localStorage.setItem('gnsc_mstores',  JSON.stringify(masterStores));
  localStorage.setItem('gnsc_mtrans',   JSON.stringify(masterTrans));
  localStorage.setItem('gnsc_mtypes',   JSON.stringify(masterTypes));
  localStorage.setItem('gnsc_indent',   JSON.stringify(masterIndent));
  if(typeof db!=='undefined') {
    db.ref('gnsc/masters').set({vehicles:masterVehicles,stores:masterStores,trans:masterTrans,types:masterTypes,indent:masterIndent})
      .catch(e=>console.warn('FB masters:',e));
  }
}
function saveGateAlerts(alerts) {
  localStorage.setItem(ALERT_KEY, JSON.stringify(alerts));
  if(typeof db!=='undefined') db.ref('gnsc/gate_alerts').set(alerts).catch(e=>console.warn(e));
}
function startFirebaseSync() {
  if(_fbListening) return;
  if(typeof firebase==='undefined'||typeof db==='undefined') {
    console.warn('Firebase not loaded — running in offline mode');
    return;
  }
  _fbListening=true;
  // Live data listener
  db.ref('gnsc/live').on('value',snap=>{
    if(_ignoreNext){_ignoreNext=false;return;}
    const d=snap.val(); if(!d) return;
    routes  =d.routes  ||[];
    vehicles=d.vehicles||[];
    actLog  =d.actLog  ||[];
    dayHist =d.dayHist ||[];
    localStorage.setItem('gnsc_routes',   JSON.stringify(routes));
    localStorage.setItem('gnsc_vehicles', JSON.stringify(vehicles));
    localStorage.setItem('gnsc_actlog',   JSON.stringify(actLog));
    localStorage.setItem('gnsc_dayhist',  JSON.stringify(dayHist));
    if(currentRole){renderAll();updateCutBan();}
  });
  // Masters listener
  db.ref('gnsc/masters').on('value',snap=>{
    const d=snap.val(); if(!d) return;
    if(d.vehicles) masterVehicles=d.vehicles;
    if(d.stores)   masterStores  =d.stores;
    if(d.trans)    masterTrans   =d.trans;
    if(d.types)    masterTypes   =d.types;
    if(d.indent)   masterIndent  =d.indent;
    localStorage.setItem('gnsc_master',  JSON.stringify(masterVehicles));
    localStorage.setItem('gnsc_mstores', JSON.stringify(masterStores));
    localStorage.setItem('gnsc_mtrans',  JSON.stringify(masterTrans));
    localStorage.setItem('gnsc_mtypes',  JSON.stringify(masterTypes));
    localStorage.setItem('gnsc_indent',  JSON.stringify(masterIndent));
    if(currentRole) refreshDL();
  });
  // Daily data listener (indent, tomorrow plan, docks)
  db.ref('gnsc/daily').on('value',snap=>{
    const d=snap.val(); if(!d) return;
    if(d.actualIndent!==undefined){
      actualIndent=parseInt(d.actualIndent)||0;
      localStorage.setItem('gnsc_actual_indent',String(actualIndent));
    }
    if(d.indentDate)  localStorage.setItem('gnsc_indent_date',d.indentDate);
    if(d.tomorrowPlan){ tomorrowPlan=d.tomorrowPlan; localStorage.setItem('gnsc_tomorrow',JSON.stringify(tomorrowPlan)); }
    if(d.docks){ DOCKS=d.docks; localStorage.setItem('gnsc_docks',JSON.stringify(DOCKS)); }
    // Always re-render so indent shows on all devices
    if(currentRole) renderAll();
  });
  // Gate alerts listener
  db.ref('gnsc/gate_alerts').on('value',snap=>{
    const alerts=snap.val()||[];
    localStorage.setItem(ALERT_KEY,JSON.stringify(alerts));
    if(currentRole==='gate') checkGateAlerts();
  });
  console.log('%c🔥 Firebase sync active','color:#F4A228;font-weight:bold');
}
function log(who, msg, color) {
  actLog.unshift({who, msg, time:nowTime(), color:color||'var(--acc)', date:TODAY});
  if(actLog.length>500) actLog.pop();
}
function toast(msg, type='') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(type==='err'?' err':'')+' show';
  setTimeout(()=>t.className='toast',2500);
}
function oMo(title, body) {
  document.getElementById('moT').innerHTML=title;
  document.getElementById('moB').innerHTML=body;
  document.getElementById('mo').classList.add('on');
}
function cMo() { document.getElementById('mo').classList.remove('on'); }
function clearData() {
  // Clear operational data only — keep all masters
  ['gnsc_routes','gnsc_vehicles','gnsc_actlog','gnsc_loadhist','gnsc_dayhist',
   'gnsc_lastday','gnsc_tomorrow','gnsc_actual_indent','gnsc_indent_date',
   'gnsc_gate_alerts','gnsc_todayindent'].forEach(k=>localStorage.removeItem(k));
  location.reload();
}
function clearAll() {
  Object.keys(localStorage).filter(k=>k.startsWith('gnsc_')).forEach(k=>localStorage.removeItem(k));
  location.reload();
}

// ─────────────────────────────────────────────
// ROUTE / VEHICLE HELPERS
// ─────────────────────────────────────────────
function rV(r)    { return r&&r.vehicleId ? vehicles.find(v=>v.id===r.vehicleId) : null; }
function vR(v)    { return v&&v.routeId   ? routes.find(r=>r.id===v.routeId)     : null; }
function rSt(r)   { if(!r||!r.vehicleId) return 'short'; const v=rV(r); return v?v.status:'short'; }
function vDT(v)   { return vR(v)?.destType || v.destType || 'local'; }
function vCity(v) { return vR(v)?.city    || v.city    || '—'; }
function vEta(v)  { return vR(v)?.eta     || v.eta     || ''; }
function vSt(v)   { return vR(v)?.stores  || v.stores  || []; }
function vRNo(v)  { return vR(v)?.routeNo || ''; }
function cutoff(r){ return (r?.destType||vDT(r||{})) === 'outstation' ? CUT_OS : CUT_L; }

function dockMins(v) {
  if(!v?.times?.dock) return 0;
  const m = nowMins() - t2m(v.times.dock);
  return m>0?m:0;
}
function dockOccupied() {
  const o={};
  vehicles.forEach(v=>{ if(v.dock&&v.dock!=='—'&&v.status==='dock') o[v.dock]=v; });
  return o;
}
function masterUpsert(num, vendor, type) {
  if(!num) return;
  const n=num.toUpperCase().replace(/\s+/g,'');
  if(!validVNum(n)) return; // silently skip invalid format
  const ex=masterVehicles.find(m=>m.number===n);
  if(ex){ if(vendor&&vendor!=='—') ex.vendor=vendor; if(type) ex.type=type; }
  else masterVehicles.push({number:n, vendor:vendor||'—', type:type||'24ft'});
  localStorage.setItem('gnsc_master',JSON.stringify(masterVehicles));
}
function masterLookup(num) { return masterVehicles.find(m=>m.number===(num||'').toUpperCase()); }
function link(vid, rid) {
  const v=vehicles.find(x=>x.id===vid), r=routes.find(x=>x.id===rid);
  if(!v||!r) return;
  if(v.routeId){ const old=routes.find(x=>x.id===v.routeId); if(old){old.vehicleId=null;old.status='short';} }
  if(r.vehicleId&&r.vehicleId!==vid){ const old=vehicles.find(x=>x.id===r.vehicleId); if(old) old.routeId=null; }
  v.routeId=r.id; r.vehicleId=v.id; r.status=v.status;
}
function unlink(vid) {
  const v=vehicles.find(x=>x.id===vid); if(!v) return;
  const r=vR(v); if(r){r.vehicleId=null;r.status='short';} v.routeId=null;
}
function recLoadTime(v) {
  if(!v.times?.dock||!v.times?.loaded) return;
  const dur=t2m(v.times.loaded)-t2m(v.times.dock);
  if(dur>0&&dur<600) loadHist.push({type:v.type||'24ft',mins:dur,date:TODAY});
}
function etaSt(v) {
  const now=nowMins(), r=vR(v);
  const cut=t2m(cutoff(r||{destType:vDT(v)}));
  if(v.status==='breakdown') return {label:'🚨 Breakdown',cls:'eta-break'};
  if(v.status==='out')       return {label:'Out at '+(v.times?.out||'—'),cls:'eta-ok'};
  const diff=cut-now;
  const lbl=vDT(v)==='outstation'?'12:30 PM':'10:30 PM';
  if(diff<0)   return {label:'⚠️ '+Math.abs(diff)+'m past cutoff',cls:'eta-late'};
  if(diff<=30) return {label:'🔴 '+diff+'m to '+lbl,cls:'eta-warn'};
  return {label:'ETA '+(vEta(v)||'—')+' · '+diff+'m to '+lbl,cls:'eta-ok'};
}

// ─────────────────────────────────────────────
// STATUS UPDATE
// ─────────────────────────────────────────────
function updateStatus(vid, newStatus) {
  const v=vehicles.find(x=>x.id===vid); if(!v) return;

  // Pool vehicles (no route) cannot progress beyond 'inside'
  if(!v.routeId && !['inside','planned'].includes(v.status) && newStatus!=='inside') {
    toast('⚠️ Assign vehicle to a route first','err'); return;
  }
  if(!v.routeId && newStatus==='dock') {
    toast('⚠️ Vehicle not assigned to a route — assign route first','err'); return;
  }

  // When marking loaded → alert gate to remove from dock
  if(newStatus==='loaded' && v.dock && v.dock!=='—') {
    const alerts=getGateAlerts().filter(a=>a.vid!==vid);
    alerts.unshift({vid,vnum:v.number,dock:v.dock,time:nowTime(),ts:Date.now(),ack:false,sentBy:'Warehouse',type:'loaded',msg:'Loaded — clear from dock'});
    localStorage.setItem(ALERT_KEY,JSON.stringify(alerts.slice(0,20)));
  }
  if(newStatus==='breakdown') {
    v.prevStatus=v.status; v.status='breakdown';
    v.times={...v.times, breakdown:nowTime()};
    const r=vR(v); if(r) r.status='short';
    log(v.number,'🚨 Breakdown reported',SC.breakdown);
  } else {
    v.status=newStatus; v.times={...v.times,[newStatus]:nowTime()};
    if(newStatus==='loaded') recLoadTime(v);
    const r=vR(v); if(r) r.status=newStatus;
    const msgs={inside:'🚛 Gate IN',dock:'🔋 At Dock',loaded:'📦 Loaded',out:'✅ Gate OUT'};
    log(v.number, msgs[newStatus]||newStatus, SC[newStatus]);
  }
  save(); cMo(); toast(v.number+' → '+SL[newStatus]); renderAll(); updateCutBan();
}

// ─────────────────────────────────────────────
// DAY START / CARRY-OVER / AUTO-ARCHIVE
// ─────────────────────────────────────────────
function snapshotDay(date) {
  // Take end-of-day snapshot before clearing
  const v=vehicles.filter(x=>x.date===date||x.isCarryOver===false);
  const vendors={};
  v.forEach(x=>{ const k=x.vendor&&x.vendor!=='—'?x.vendor:'Unknown'; vendors[k]=(vendors[k]||0)+1; });
  const breakdowns=actLog.filter(a=>a.date===date&&a.msg.includes('Breakdown')).map(a=>({vehicle:a.who,time:a.time,msg:a.msg}));
  const cut_os=t2m(CUT_OS), cut_l=t2m(CUT_L);
  const delayed=v.filter(x=>{ if(x.status!=='out'||!x.times?.out) return false; const cut=vDT(x)==='outstation'?cut_os:cut_l; return t2m(x.times.out)>cut; }).map(x=>({vehicle:x.number,time:x.times.out,vendor:x.vendor}));
  const existing=dayHist.findIndex(d=>d.date===date);
  const snap={date,vehicles:v.length,vendors,breakdowns,delayed,indentPlan:masterIndent[date]||0,indentActual:actualIndent||0};
  if(existing>=0) dayHist[existing]=snap; else dayHist.push(snap);
  dayHist=dayHist.filter(d=>{ const dd=new Date(d.date),now=new Date(); return (now-dd)/(1000*60*60*24)<=30; }); // keep 30 days
}

function checkDay() {
  TODAY = getToday(); // always use current date
  const last = localStorage.getItem('gnsc_lastday');
  if(last && last!==TODAY) {
    snapshotDay(last); // save yesterday's data before clearing

    // ── Step 1: Identify physical state of all vehicles ──────────────────
    const physicalVehicles = vehicles.filter(v => v.status !== 'out');
    // Vehicles that physically arrived (inside/dock/loaded) → carry-over, not in plan
    const carryOverVehicles = physicalVehicles.filter(v => ['inside','dock','loaded'].includes(v.status));
    // Vehicles that never arrived (planned only) → remove entirely
    // departed → kept for 2hr rule via autoArchive

    // ── Step 2: Clear all routes (fresh plan) ────────────────────────────
    routes = [];

    // ── Step 3: Keep only carry-over physical vehicles, clear planned ─────
    vehicles = vehicles.filter(v => {
      if(v.status === 'out') return true;        // departed — autoArchive handles
      if(['inside','dock','loaded'].includes(v.status)) {
        v.isCarryOver = true;
        v.carryOverDate = last;
        v.routeId = null;                        // unlink from yesterday's route
        return true;
      }
      return false;                              // planned but never arrived → remove
    });

    // ── Step 4: Activate tomorrow's plan, skip undispatched carry-overs ──
    const coNumbers = new Set(vehicles.filter(v=>v.isCarryOver).map(v=>v.number));
    let ra=0, va=0, skipped=[];

    if(tomorrowPlan.length) {
      tomorrowPlan.forEach(p=>{
        // Skip if vehicle is carry-over (undispatched) — cannot be re-planned
        if(p.vehicleNo && coNumbers.has(p.vehicleNo)) {
          skipped.push(p.vehicleNo);
          // Still add the route but as short (no vehicle)
          const rId=genRId();
          const route={id:rId,routeNo:p.routeNo,city:p.city,stores:p.stores,destType:p.destType,eta:p.eta,notes:'',vehicleId:null,status:'short',date:TODAY};
          routes.push(route); ra++;
          return;
        }
        const rId=genRId();
        const route={id:rId,routeNo:p.routeNo,city:p.city,stores:p.stores,destType:p.destType,eta:p.eta,notes:'',vehicleId:null,status:'short',date:TODAY};
        routes.push(route); ra++;
        if(p.vehicleNo) {
          const m=masterLookup(p.vehicleNo);
          const vId=genId();
          const veh={id:vId,number:p.vehicleNo,type:p.type||(m?.type||'24ft'),vendor:p.vendor!=='—'?p.vendor:(m?.vendor||'—'),dock:'—',routeId:rId,status:'planned',times:{planned:'00:00'},date:TODAY,eta:p.eta};
          vehicles.push(veh);
          route.vehicleId=vId; route.status='planned'; va++;
        }
      });
      tomorrowPlan=[];
      localStorage.removeItem('gnsc_tomorrow');
    }

    const co=vehicles.filter(v=>v.isCarryOver).length;
    const msgs=[];
    if(ra) msgs.push(ra+' routes from tomorrow\'s plan');
    if(co) msgs.push(co+' carry-over vehicles (not in plan)');
    if(skipped.length) msgs.push(skipped.length+' vehicles skipped (undispatched)');
    if(msgs.length) toast('🌅 New day · '+msgs.join(' · '));

    save();
  }
  localStorage.setItem('gnsc_lastday',TODAY);
  autoArchive();
}

function autoArchive() {
  const now=nowMins(), midnight=t2m('00:00');
  vehicles=vehicles.filter(v=>{
    if(v.status!=='out') return true;
    const outM=t2m(v.times?.out||'00:00');
    const elapsed=now>=outM?now-outM:1440-outM+now;
    if(v.isCarryOver) return elapsed<120;  // carry-over: 2hr rule always
    // Today's departed: midnight cleanup handles pre-midnight departures
    // Post-midnight departures: remove 2hrs after departure
    if(outM>t2m('00:00')&&outM<now) return elapsed<120; // departed after midnight today
    return true; // before midnight — kept until day change (checkDay handles removal)
  });
  routes=routes.filter(r=>!r.vehicleId||!!vehicles.find(v=>v.id===r.vehicleId));
}

function renderCOBan() {
  const el=document.getElementById('coBan'); if(!el) return;
  const coV  = vehicles.filter(v=>v.isCarryOver&&v.status!=='out');
  const coOut= vehicles.filter(v=>v.isCarryOver&&v.status==='out');
  if(!coV.length&&!coOut.length){ el.innerHTML=''; return; }
  const dates=[...new Set(vehicles.filter(v=>v.isCarryOver).map(v=>v.carryOverDate))].sort().reverse();
  el.innerHTML=dates.map(date=>{
    const dv  = coV.filter(v=>v.carryOverDate===date);
    const dOut= coOut.filter(v=>v.carryOverDate===date);
    if(!dv.length&&!dOut.length) return '';
    return `<div class="co-ban">
      <div class="co-title">
        <span>🔄 From ${esc(date)} — ${dv.length} pending${dOut.length?' · '+dOut.length+' recently out':''}</span>
        <span onclick="dismissCO('${date}')" style="cursor:pointer;font-size:11px;opacity:.7;font-weight:600">Dismiss ×</span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        ${dv.map(v=>{const r=vR(v);return `<div class="co-chip" onclick="openVMo('${v.id}')"><span class="cc-n">${esc(v.number)}</span><span class="cc-s">${r?esc(r.routeNo)+' · '+esc(r.city):'—'} · ${SI[v.status]} ${SL[v.status]}</span></div>`;}).join('')}
        ${dOut.map(v=>`<div class="co-chip" style="opacity:.5;border-style:dashed"><span class="cc-n">${esc(v.number)}</span><span class="cc-s">✅ Out ${v.times?.out||'—'}</span></div>`).join('')}
      </div>
    </div>`;
  }).join('');
}
function dismissCO(date) {
  const pending=vehicles.filter(v=>v.isCarryOver&&v.carryOverDate===date&&v.status!=='out');
  if(pending.length){ toast('⚠️ '+pending.length+' still not departed','err'); return; }
  vehicles=vehicles.filter(v=>!(v.isCarryOver&&v.carryOverDate===date));
  routes=routes.filter(r=>!r.isCarryOver||r.carryOverDate!==date);
  save(); renderCOBan(); renderAll();
}

function updateCutBan() {
  const el=document.getElementById('cutBan'); if(!el) return;
  const now=nowMins(), cL=t2m(CUT_L), cOS=t2m(CUT_OS);
  const pL =routes.filter(r=>!['out','breakdown'].includes(rSt(r))&&r.destType!=='outstation').length;
  const pOS=routes.filter(r=>!['out','breakdown'].includes(rSt(r))&&r.destType==='outstation').length;
  if(now>cOS&&pOS)      { el.className='cut-ban cb-over'; el.textContent='🚨 PAST 12:30 PM OUTSTATION CUTOFF · '+pOS+' not departed'; }
  else if(now>cL&&pL)   { el.className='cut-ban cb-over'; el.textContent='🚨 PAST 10:30 PM LOCAL CUTOFF · '+pL+' not departed'; }
  else if(cOS-now<=60&&pOS){ el.className='cut-ban cb-warn'; el.textContent='⚠️ '+(cOS-now)+'m to outstation cutoff · '+pOS+' pending'; }
  else if(cL-now<=60&&pL)  { el.className='cut-ban cb-warn'; el.textContent='⚠️ '+(cL-now)+'m to local cutoff · '+pL+' pending'; }
  else { el.className='cut-ban cb-ok'; el.textContent='🕐 Cutoffs: 12:30 PM (Outstation) · 10:30 PM (Local) · '+(pL+pOS)+' pending'; }
}

let currentRole='', currentTab='', started=false;

function sel(role) {
  currentRole=role;

  document.getElementById('rg').style.display='none';
  document.getElementById('app').style.display='block';
  const cb=document.getElementById('clearBar'); if(cb) cb.style.display='none';
  const chip=document.getElementById('rChip');
  chip.textContent=ri.icon+' '+ri.name; chip.className='role-chip '+ri.cls;
  ['leader','transport','warehouse','gate'].forEach(r=>{
    const el=document.getElementById('rs-'+r);
    if(el) el.className='rsb rsb-'+r[0]+(r===role?' on':'');
  });
  buildTabs();
  switchTab(ROLE_TABS[role][0].id);
  if(!started) {
    started=true;
    checkDay(); tick();
    setInterval(tick,60000);
    setInterval(updateCutBan,30000);
    setInterval(()=>{ TODAY=getToday(); if(currentRole){autoArchive();renderAll();updateCutBan();} },60000);
    setInterval(()=>{ const d=new Date(); if(d.getHours()===0&&d.getMinutes()===0){ TODAY=getToday(); checkDay(); renderCOBan(); renderAll(); } },60000);
  }
  // Firebase connection status
  if(typeof db!=='undefined') {
    db.ref('.info/connected').on('value', snap=>{
      const liveEl=document.getElementById('liveInd');
      if(liveEl) {
        if(snap.val()) { liveEl.textContent='● LIVE'; liveEl.style.color='var(--grn)'; }
        else { liveEl.textContent='○ OFFLINE'; liveEl.style.color='var(--red)'; }
      }
    });
  }
  actualIndent = parseInt(localStorage.getItem('gnsc_actual_indent')||'0')||0;
  // Firebase connection status indicator
  if(typeof db!=='undefined') {
    db.ref('.info/connected').on('value', snap=>{
      const el=document.getElementById('liveInd');
      if(el){ if(snap.val()){el.textContent='🔥 LIVE';el.style.color='var(--grn)';}else{el.textContent='○ OFFLINE';el.style.color='var(--red)';} }
    });
  }
  // Gate alert polling
  if(role==='gate') startAlertPoll();
  else stopAlertPoll();
  // Indent prompt for transport on first login of the day
  if(role==='transport') checkIndentPrompt();
}

function renderDash() {
  const el=document.getElementById('pg-dashboard'); if(!el||!el.classList.contains('on')) return;
  const now=nowMins();
  // Routes = today's plan (one route = one dispatch)
  const todayRoutes = routes.filter(r=>!r.isCarryOver);
  const total = todayRoutes.length;

  // Stage tracking — only vehicles assigned to a route (not pool, not carry-over)
  const assigned = v => !!v.routeId && !v.isCarryOver;
  const planned = vehicles.filter(v=>assigned(v)&&v.status==='planned');
  const inside  = vehicles.filter(v=>assigned(v)&&v.status==='inside');
  const atDock  = vehicles.filter(v=>assigned(v)&&v.status==='dock');
  const loaded  = vehicles.filter(v=>assigned(v)&&v.status==='loaded');
  const out     = vehicles.filter(v=>assigned(v)&&v.status==='out');
  const broke   = vehicles.filter(v=>assigned(v)&&v.status==='breakdown');
  const inGNSC  = vehicles.filter(v=>assigned(v)&&['inside','dock','loaded'].includes(v.status));
  const shortR  = todayRoutes.filter(r=>rSt(r)==='short');
  const totalV  = vehicles.filter(v=>assigned(v)).length;
  const pctV    = totalV?Math.round(out.length/totalV*100):0;
  const L  = arr=>arr.filter(v=>vDT(v)!=='outstation').length;
  const OS = arr=>arr.filter(v=>vDT(v)==='outstation').length;
  const LR = arr=>arr.filter(r=>r.destType!=='outstation').length;
  const OSR= arr=>arr.filter(r=>r.destType==='outstation').length;

  function bigCard(ic,lb,n,l,os,col) {
    return `<div style="background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:12px;flex:1">

        <div style="flex:1;background:var(--acd);border-radius:5px;padding:4px;text-align:center"><div style="font-family:var(--mono);font-size:13px;font-weight:800;color:var(--acc)">${l}</div><div style="font-size:8px;color:var(--mut);font-weight:700">🏙️ L</div></div>

      </div>
    </div>`;
  }
  function stRow(ic,lb,arr,col) {
    return `<div style="display:grid;grid-template-columns:1fr 40px 34px 34px;align-items:center;padding:8px 13px;border-bottom:1px solid var(--bdr2)">

      <div style="font-family:var(--mono);font-size:11px;font-weight:700;color:var(--blu);text-align:center">${OS(arr)||'·'}</div>
    </div>`;

  // Alerts
  let alerts='';
  broke.forEach(v=>{ alerts+=`<div class="al al-r">🚨 <strong>${esc(v.number)}</strong> — Breakdown · ${esc(vCity(v))}</div>`; });

  if(shortR.length>3) alerts+=`<div class="al al-o">⚠️ ${shortR.length-3} more routes without vehicles</div>`;
  loaded.forEach(v=>{ const ct=t2m(cutoff({destType:vDT(v)})),df=ct-now; if(df<=0) alerts+=`<div class="al al-r">🚨 <strong>${esc(v.number)}</strong> loaded — past cutoff!</div>`; else if(df<=30) alerts+=`<div class="al al-o">⚠️ <strong>${esc(v.number)}</strong> loaded — ${df}m to cutoff</div>`; });
  vehicles.filter(v=>v.routeId&&v.status==='dock'&&dockMins(v)>=90).forEach(v=>{ alerts+=`<div class="al al-o">⚠️ <strong>${esc(v.number)}</strong> on dock ${dockMins(v)}m — over 1:30</div>`; });

  // City tracker
  const cmap={};
  routes.forEach(r=>{ const c=r.city||'?'; if(!cmap[c]) cmap[c]={t:0,out:0,l:0,os:0,short:0,break:0}; cmap[c].t++; const rs=rSt(r); if(rs==='out')cmap[c].out++; if(rs==='short')cmap[c].short++; if(rs==='breakdown')cmap[c].break++; if(r.destType==='outstation')cmap[c].os++;else cmap[c].l++; });
  const cityHTML=Object.entries(cmap).sort((a,b)=>a[1].out/a[1].t-b[1].out/b[1].t).map(([city,d])=>{

      <div style="font-size:9px;color:var(--dim)">${d.t}v · ${d.l}L ${d.os}OS${d.short?` <span style="color:var(--org)">⚠️${d.short} short</span>`:''}${d.break?` <span style="color:var(--red)">🚨${d.break}</span>`:''}</div>
    </div>`;
  }).join('');

  const indentPlanned = masterIndent[TODAY]||0;
  const indentActual  = actualIndent||0;

  el.innerHTML=`
    <div class="pg-h"><div><div class="pg-t">Today's Overview</div><div class="pg-s">${total} routes planned · ${inGNSC.length} in GNSC · ${out.length} departed</div></div><div class="pg-time">${nowTime()}</div></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="background:var(--sur);border:1px solid var(--bdr);border-radius:20px;padding:6px 14px;display:inline-flex;align-items:baseline;gap:8px">
        <span style="font-size:10px;font-weight:700;color:var(--mut)">📦 Indent</span>
        <span style="font-family:var(--mono);font-size:20px;font-weight:800;color:${indentActual?'var(--acc)':'var(--dim)'}">${indentActual||'—'}</span>
        <span style="font-size:10px;color:var(--dim);font-weight:600">actual</span>
        ${indentPlanned?`<span style="font-size:10px;color:var(--dim)">/ ${indentPlanned} planned</span>`:''}
      </div>
      ${currentRole==='transport'?`<button onclick="checkIndentPrompt()" style="background:transparent;border:none;color:var(--dim);font-size:11px;font-weight:700;cursor:pointer;padding:4px 8px">✏️ Update</button>`:''}
    </div>
    <div style="display:flex;gap:7px;margin-bottom:8px">${bigCard('📋','Today\'s Plan',total,LR(todayRoutes),OSR(todayRoutes),'var(--acc)')}${bigCard('📦','Loaded',loaded.length,L(loaded),OS(loaded),'var(--grn)')}</div>
    <div class="prog"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px"><span style="font-weight:700;font-size:12px">Dispatch Progress</span><span class="pg-time">${pctV}%</span></div><div class="pb"><div class="pf" style="width:${pctV}%"></div></div><div class="pm"><span>${totalV-out.length-broke.length} vehicles remaining</span><span>${out.length}/${totalV} departed</span></div></div>
    <div style="background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:10px">
      <div style="display:grid;grid-template-columns:1fr 40px 34px 34px;padding:5px 13px;background:var(--sur2);border-bottom:1px solid var(--bdr)">

        <div style="font-size:9px;font-weight:800;color:var(--mut);text-align:center">All</div>
        <div style="font-size:9px;font-weight:800;color:var(--acc);text-align:center">🏙️</div>
        <div style="font-size:9px;font-weight:800;color:var(--blu);text-align:center">🛣️</div>
      </div>
      ${shortR.length?stRow('⚠️','Vehicle Short',shortR,'var(--org)'):''}
      ${stRow('🏭','Not at GNSC',planned,planned.length?'var(--red)':'var(--grn)')}
      ${inside.length?stRow('🕐','In GNSC',inside,'var(--blu)'):''}
      ${atDock.length?stRow('🔋','At Dock',atDock,'var(--pur)'):''}
      ${loaded.length?stRow('📦','Loaded',loaded,'var(--grn)'):''}
      ${stRow('✅','Departed',out,'var(--dim)')}
      ${broke.length?stRow('🚨','Breakdown',broke,'var(--red)'):''}
    </div>
    <div class="sec" style="margin-bottom:8px">🚨 Alerts</div>
    <div style="margin-bottom:12px">${alerts||'<div class="al al-g">✅ All clear</div>'}</div>
    <div class="sec" style="margin-bottom:8px">📍 City Dispatch</div>
    <div style="background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden">${cityHTML||'<div class="empty"><div class="empty-ic">📍</div><div class="empty-t">No routes yet</div></div>'}</div>
    <div style="height:16px"></div>`;

// SEARCH BAR HELPER (shows when list > 8)
// ─────────────────────────────────────────────
function searchBar(id, placeholder='Search...') {
  return `<div style="position:relative;margin-bottom:8px">
    <input id="${id}" type="text" placeholder="🔍 ${placeholder}"
      oninput="filterList('${id}')"
      style="width:100%;background:var(--sur2);border:1px solid var(--bdr);border-radius:20px;padding:7px 32px 7px 14px;color:var(--txt);font-family:'Inter',sans-serif;font-size:12px;outline:none"
      onfocus="this.style.borderColor='var(--acc)'" onblur="this.style.borderColor='var(--bdr)'">
    <span onclick="document.getElementById('${id}').value='';filterList('${id}')" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--dim);cursor:pointer;font-size:16px;line-height:1">×</span>
  </div>`;
}
function filterList(inputId) {
  const q=(document.getElementById(inputId)?.value||'').toLowerCase().trim();
  const container=document.getElementById(inputId+'_list');
  if(!container) return;
  container.querySelectorAll('[data-s]').forEach(el=>{
    el.style.display=!q||(el.getAttribute('data-s')||'').toLowerCase().includes(q)?'':'none';
  });
}

function renderFleet() {
  const el=document.getElementById('pg-fleet'); if(!el||!el.classList.contains('on')) return;
  const now=nowMins();
  const todayRoutes=routes.filter(r=>!r.isCarryOver);
  const inG    = vehicles.filter(v=>['inside','dock','loaded'].includes(v.status)&&v.routeId&&!v.isUnplanned&&!v.masterIncomplete);
  const exp    = vehicles.filter(v=>v.status==='planned'&&v.routeId&&!v.isUnplanned&&!v.masterIncomplete);
  const broke  = vehicles.filter(v=>v.status==='breakdown'&&v.routeId&&!v.isUnplanned&&!v.masterIncomplete);
  const shortR = routes.filter(r=>rSt(r)==='short');
  const lateETA= exp.filter(v=>vEta(v)&&now>t2m(vEta(v)));
  const soonETA= exp.filter(v=>vEta(v)&&now<=t2m(vEta(v))).sort((a,b)=>t2m(vEta(a))-t2m(vEta(b)));
  const noETA  = exp.filter(v=>!vEta(v));
  const poolV  = vehicles.filter(v=>!v.routeId&&['planned','inside'].includes(v.status)&&!v.masterIncomplete&&masterLookup(v.number)&&!masterLookup(v.number).incomplete);

  // City-wise summary
  const cityMap={};
  todayRoutes.forEach(r=>{ const city=r.city||'—'; if(!cityMap[city]) cityMap[city]={l:0,os:0,stores:0}; if(r.destType==='outstation') cityMap[city].os++; else cityMap[city].l++; cityMap[city].stores+=(r.stores?.length||0); });
  const cityChips=Object.entries(cityMap).sort((a,b)=>a[0].localeCompare(b[0])).map(([city,d])=>`<div style="background:var(--sur);border:1px solid var(--bdr);border-radius:8px;padding:6px 10px"><div style="font-weight:800;font-size:12px;color:var(--txt);margin-bottom:3px">${esc(city)}</div><div style="display:flex;gap:5px;align-items:center">${d.l?`<span style="font-size:11px;font-weight:800;color:var(--acc)">L·${d.l}</span>`:''}${d.os?`<span style="font-size:11px;font-weight:800;color:var(--blu)">OS·${d.os}</span>`:''}<span style="font-size:9px;color:var(--mut)">${d.stores} store${d.stores!==1?'s':''}</span></div></div>`).join('');

  function mChip(num, sub, col, bg, pulse=false) {
    return `<div class="mc" style="background:${bg};border-color:${col};${pulse?'animation:pulse 1.8s infinite':''}">
      <span class="mn" style="color:${col}">${esc(num)}</span>
      <span class="ms" style="color:${col}">${esc(sub)}</span>
    </div>`;
  }

  function chipSection(title, col, items) {
    if(!items.length) return '';
    return `<div class="sec" style="margin-bottom:8px;color:${col}">${title} <span class="sec-b">${items.length}</span></div>
    <div style="background:var(--sur);border:1px solid ${col};border-radius:var(--r);padding:9px 12px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:5px">${items.join('')}</div>`;
  }

  let html=`
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px">
      <div class="sc" style="${inG.length?'border-color:var(--blu)':''}"><div class="sc-n" style="color:${inG.length?'var(--blu)':'var(--dim)'}">${inG.length}</div><div class="sc-l">🕐 In GNSC</div></div>
      <div class="sc" style="${exp.length?'border-color:var(--acc)':''}"><div class="sc-n" style="color:${exp.length?'var(--acc)':'var(--dim)'}">${exp.length}</div><div class="sc-l">⏳ Expected</div></div>
      <div class="sc" style="${shortR.length?'border-color:var(--org);background:var(--ogd)':''}"><div class="sc-n" style="color:${shortR.length?'var(--org)':'var(--dim)'}">${shortR.length}</div><div class="sc-l">⚠️ Short</div></div>
      <div class="sc" style="${lateETA.length?'border-color:var(--red);background:var(--rdd)':''}"><div class="sc-n" style="color:${lateETA.length?'var(--red)':'var(--dim)'}">${lateETA.length}</div><div class="sc-l">🔴 Overdue</div></div>
      <div class="sc" style="${broke.length?'border-color:var(--red);background:var(--rdd)':''}"><div class="sc-n" style="color:${broke.length?'var(--red)':'var(--dim)'}">${broke.length}</div><div class="sc-l">🚨 Breakdown</div></div>
      <div class="sc" style="${poolV.length?'border-color:var(--blu);background:var(--bld)':''}"><div class="sc-n" style="color:${poolV.length?'var(--blu)':'var(--dim)'}">${poolV.length}</div><div class="sc-l">🔄 Pool</div></div>
    </div>`;

  html+=chipSection('🔄 Pool — No Route','var(--blu)',poolV.map(v=>mChip(v.number,SL[v.status]+(v.vendor&&v.vendor!=='—'?' · '+esc(v.vendor):''),'var(--blu)','var(--bld)')));
  html+=chipSection('⚠️ Vehicle Short','var(--org)',shortR.map(r=>mChip(r.routeNo||r.city,r.city,'var(--org)','var(--ogd)')));
  html+=chipSection('🚨 Breakdown','var(--red)',broke.map(v=>mChip(v.number,'Since '+(v.times?.breakdown||'—'),'var(--red)','var(--rdd)',true)));
  html+=chipSection('🔴 ETA Overdue','var(--red)',lateETA.map(v=>mChip(v.number,vEta(v)+' · '+(now-t2m(vEta(v)))+'m late','var(--red)','var(--rdd)',true)));
  html+=chipSection('⏳ Expected','var(--acc)',soonETA.map(v=>{ const df=t2m(vEta(v))-now,urg=df<=30; return mChip(v.number,vEta(v)+' · in '+df+'m',urg?'var(--org)':'var(--acc)',urg?'var(--ogd)':'var(--acd)'); }));
  html+=chipSection('⏳ No ETA','var(--dim)',noETA.map(v=>mChip(v.number,'no eta','var(--dim)','var(--sur2)')));

  // City-wise summary
  if(cityChips) html+=`<div class="sec" style="margin-bottom:8px">🏙️ By City</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">${cityChips}</div>`;

  // Transporter cards
  const tmap={};
  vehicles.filter(v=>v.routeId&&!v.isUnplanned&&!v.masterIncomplete).forEach(v=>{ const k=v.vendor&&v.vendor!=='—'?v.vendor:'Unknown'; if(!tmap[k]) tmap[k]={t:0,inG:[],eta:[],late:[],brk:[],out:0}; tmap[k].t++; if(['inside','dock','loaded'].includes(v.status))tmap[k].inG.push(v); if(v.status==='planned'){const e=vEta(v);if(e&&now>t2m(e))tmap[k].late.push(v);else tmap[k].eta.push(v);} if(v.status==='breakdown')tmap[k].brk.push(v); if(v.status==='out')tmap[k].out++; });
  const tInfo={}; masterTrans.forEach(t=>{ tInfo[t.name]=t; });

  const tmapKeys=Object.keys(tmap);
  html+=`<div class="sec" style="margin-bottom:8px">🏢 By Transporter <span class="sec-b">${tmapKeys.length}</span></div>`;
  if(tmapKeys.length>8) html+=searchBar('flSrch','Transporter or vehicle...');
  html+=`<div id="flSrch_list">`;
  Object.entries(tmap).sort((a,b)=>b[1].t-a[1].t).forEach(([k,d])=>{
    const hasIssue=d.late.length||d.brk.length, ti=tInfo[k];
    const searchStr=(k+' '+d.inG.map(v=>v.number).join(' ')+' '+d.eta.map(v=>v.number).join(' ')).toLowerCase();
    html+=`<div data-s="${searchStr}" style="background:var(--sur);border:1px solid ${hasIssue?'var(--red)':'var(--bdr)'};border-radius:var(--r);margin-bottom:8px;overflow:hidden">
      <div style="padding:10px 13px;border-bottom:1px solid var(--bdr2)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
          <span style="font-weight:800;font-size:13px">${esc(k)}</span>
          ${ti?.phone?`<a href="tel:${ti.phone}" style="font-size:10px;color:var(--blu);text-decoration:none">📞 ${ti.phone}</a>`:''}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px">
          <span style="background:var(--sur2);border:1px solid var(--bdr);border-radius:4px;padding:2px 6px;font-size:10px;font-weight:700;color:var(--mut)">📋 ${d.t}</span>
          ${d.inG.length?`<span style="background:var(--bld);border:1px solid var(--blu);border-radius:4px;padding:2px 6px;font-size:10px;font-weight:700;color:var(--blu)">🕐 ${d.inG.length}</span>`:''}
          ${d.eta.length?`<span style="background:var(--pud);border:1px solid var(--pur);border-radius:4px;padding:2px 6px;font-size:10px;font-weight:700;color:var(--pur)">⏳ ${d.eta.length}</span>`:''}
          ${d.late.length?`<span style="background:var(--rdd);border:1px solid var(--red);border-radius:4px;padding:2px 6px;font-size:10px;font-weight:700;color:var(--red);animation:pulse 1.8s infinite">⚠️ ${d.late.length} late</span>`:''}
          ${d.brk.length?`<span style="background:var(--rdd);border:1px solid var(--red);border-radius:4px;padding:2px 6px;font-size:10px;font-weight:700;color:var(--red)">🚨 ${d.brk.length}</span>`:''}
          ${d.out?`<span style="background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:4px;padding:2px 6px;font-size:10px;font-weight:700;color:var(--dim)">✅ ${d.out}</span>`:''}
        </div>
      </div>
      <div style="padding:8px 12px;display:flex;flex-wrap:wrap;gap:4px">
        ${[...d.brk.map(v=>mChip(v.number,'🚨 breakdown','var(--red)','var(--rdd)',true)),
           ...d.late.map(v=>mChip(v.number,vEta(v)+' late','var(--red)','var(--rdd)')),
           ...d.inG.map(v=>mChip(v.number,SL[v.status],'var(--blu)','var(--bld)')),
           ...d.eta.map(v=>mChip(v.number,vEta(v)||'no eta','var(--pur)','var(--pud)'))].join('')||'<span style="font-size:11px;color:var(--grn);font-weight:600">✅ All departed</span>'}
      </div>
    </div>`;
  });
  html+=`</div>`; // close flSrch_list

  el.innerHTML=`<div class="pg-h"><div><div class="pg-t">🚛 Fleet Summary</div><div class="pg-s">ETA · Overdue · Transporter</div></div></div>${html}<div style="height:16px"></div>`;
}

// ROUTES TAB
// ─────────────────────────────────────────────
let rFilter='all';
function renderRoutes() {
  const el=document.getElementById('pg-routes'); if(!el||!el.classList.contains('on')) return;
  const now=nowMins();
  const lRS  = r=>{ if(!r.vehicleId) return 'short'; const v=rV(r); return v?v.status:'short'; };
  const isDelay = r=>{ const s=lRS(r); if(['short','out','breakdown'].includes(s)) return false; return r.eta&&now>t2m(r.eta); };

  // Unplanned vehicles — gate added, transport needs to assign route
  // Unplanned in routes tab = gate inwarded, in master WITH COMPLETE details, no route assigned
  // Vehicles not in master or incomplete → only visible in Vehicles tab
  const unplanned=vehicles.filter(v=>{
    if(!v.isUnplanned||v.routeId||v.status==='out') return false;
    const m=masterLookup(v.number);
    return m && !m.incomplete && m.vendor && m.vendor!=='—' && m.type && m.type!=='—';
  });
  let unplannedHtml='';
  if(unplanned.length&&currentRole==='transport') {
    unplannedHtml=`<div style="background:var(--ogd);border:2px solid var(--org);border-radius:var(--r);padding:11px 13px;margin-bottom:10px">
      <div style="font-size:11px;font-weight:800;color:var(--org);margin-bottom:7px">⚠️ ${unplanned.length} Unplanned Arrival${unplanned.length>1?'s':''} at Gate — tap to assign route</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        ${unplanned.map(v=>`<div onclick="openPoolAssign('${v.id}')" style="background:var(--sur);border:1px solid var(--org);border-radius:7px;padding:6px 10px;cursor:pointer"><div style="font-family:var(--mono);font-weight:800;font-size:13px;color:var(--org)">${esc(v.number)}</div><div style="font-size:9px;color:var(--mut)">${esc(v.vendor!=='—'?v.vendor:'—')} · In GNSC ${v.times?.inside||'—'}</div></div>`).join('')}
      </div>
    </div>`;
  }

  // Pool vehicles — unassigned, in system (planned or inside), in master
  // Pool = unassigned vehicles available for route assignment
  // Includes carry-over and inside vehicles — they can be assigned to today's routes
  // Exclude only masterIncomplete vehicles (transport must update master first)
  // Pool: no route, in master with complete details — includes gate-inwarded vehicles if in master
  const pool=vehicles.filter(v=>{
    if(v.routeId||v.status==='out'||v.masterIncomplete) return false;
    if(!['planned','inside','dock','loaded'].includes(v.status)) return false;
    const m=masterLookup(v.number);
    return m && !m.incomplete && m.vendor && m.vendor!=='—' && m.type && m.type!=='—';
  });
  let poolHtml='';
  if(pool.length) {
    poolHtml=`<div style="background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 13px;margin-bottom:12px">
      <div class="sec" style="margin-bottom:7px">🚛 Pool — No Route <span class="sec-b">${pool.length}</span> <span style="font-size:9px;font-weight:400;color:var(--dim);text-transform:none">tap to assign</span></div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">
        ${pool.map(v=>`<div class="pc" onclick="openPoolAssign('${v.id}')" style="border-color:var(--blu);background:var(--bld)"><span class="pn" style="color:var(--blu)">${esc(v.number)}</span><span class="ps" style="color:var(--blu)">${SI[v.status]} ${SL[v.status]}${v.vendor&&v.vendor!=='—'?' · '+esc(v.vendor):''}</span></div>`).join('')}
      </div>
    </div>`;
  }

  // Counts
  const cnt={all:routes.length,short:routes.filter(r=>lRS(r)==='short').length,planned:routes.filter(r=>lRS(r)==='planned').length,delayed:routes.filter(isDelay).length};
  const fcHtml=[{k:'all',lb:'All'},{k:'short',lb:'⚠️ Short'},{k:'planned',lb:'⏳ Planned'},{k:'delayed',lb:'🔴 Delayed'}].map(f=>{
    const n=cnt[f.k];
    const badge=n&&f.k!=='all'?` <span style="background:${f.k==='short'?'var(--org)':'var(--red)'};color:#fff;border-radius:8px;padding:0 5px;font-size:9px">${n}</span>`:'';
    return `<div class="fc${rFilter===f.k?' on':''}" onclick="rFilter='${f.k}';renderRoutes()">${f.lb}${badge}</div>`;
  }).join('');

  const filtered = rFilter==='all'?routes:rFilter==='delayed'?routes.filter(isDelay):routes.filter(r=>lRS(r)===rFilter);
  const ORD={short:0,breakdown:1,dock:2,loaded:3,inside:4,planned:5,out:6};
  const sorted=[...filtered].sort((a,b)=>(ORD[lRS(a)]??9)-(ORD[lRS(b)]??9));

  let listHtml='';
  if(!routes.length) {
    listHtml='<div class="empty"><div class="empty-ic">📍</div><div class="empty-t">No routes yet<br>Go to ADD tab to plan</div></div>';
  } else if(!sorted.length) {
    listHtml='<div class="empty"><div class="empty-ic">📍</div><div class="empty-t">No routes in this filter</div></div>';
  } else {
    listHtml=`${sorted.length>8?searchBar('rSrch','Route, city, vehicle...'):''}
    <div id="rSrch_list" style="background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden">
      <div style="display:grid;grid-template-columns:16px 1fr 100px 68px 72px;gap:6px;padding:6px 12px;background:var(--sur2);border-bottom:1px solid var(--bdr)">
        <div></div>
        <div style="font-size:9px;font-weight:800;color:var(--dim);text-transform:uppercase">Route · Stores</div>
        <div style="font-size:9px;font-weight:800;color:var(--dim);text-transform:uppercase">Vehicle</div>
        <div style="font-size:9px;font-weight:800;color:var(--dim);text-transform:uppercase">ETA</div>
        <div style="font-size:9px;font-weight:800;color:var(--dim);text-transform:uppercase">Status</div>
      </div>
      ${sorted.map((r,i)=>{
        const v=rV(r), rs=lRS(r), isLast=i===sorted.length-1;
        const dot=r.destType==='outstation'
          ?`<div style="width:7px;height:7px;border-radius:50%;background:var(--blu);flex-shrink:0"></div>`
          :`<div style="width:7px;height:7px;border-radius:50%;background:var(--acc);flex-shrink:0"></div>`;
        const yd=v?.isCarryOver?'<span class="yday">YDAY</span>':'';
        return `<div class="rrow" data-s="${(r.city+' '+r.routeNo+' '+(v?.number||'')+' '+(v?.vendor||'')+' '+r.stores?.join(' ')).toLowerCase()}" style="border-left:3px solid ${SC[rs]};border-bottom:${isLast?'none':'1px solid var(--bdr2)'}" onclick="openRMo('${r.id}')">
          <div style="display:flex;align-items:center;justify-content:center">${dot}</div>
          <div style="min-width:0">
            <div style="font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(r.city)} <span style="font-size:10px;color:var(--dim);font-weight:400">${esc(r.routeNo)}</span></div>
            <div style="font-size:10px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.stores?.join(' · ')||'—'}</div>
          </div>
          <div style="min-width:0">
            ${v?`<div style="font-family:var(--mono);font-size:11px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(v.number)}${yd}</div><div style="font-size:9px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(v.vendor&&v.vendor!=='—'?v.vendor:'—')}</div>`
              :`<div style="font-size:10px;color:var(--org);font-weight:700">⚠️ No vehicle</div>${currentRole==='transport'?`<div style="font-size:9px;color:var(--org);cursor:pointer" onclick="event.stopPropagation();openAssignMo('${r.id}')">Assign →</div>`:''}`}
          </div>
          <div style="font-family:var(--mono);font-size:11px;color:var(--mut);font-weight:700">${esc(r.eta)||'—'}</div>
          <div><span class="rb rb-${rs}">${SI[rs]||''} ${SL[rs]||rs}</span></div>
        </div>`;
      }).join('')}
    </div>`;
  }

  el.innerHTML=`<div class="pg-h"><div><div class="pg-t">Routes</div><div class="pg-s">${routes.length} routes · ${cnt.short} short · ${cnt.delayed} delayed</div></div></div>
    <div class="frow">${fcHtml}</div>
    ${unplannedHtml}${poolHtml}${listHtml}<div style="height:16px"></div>`;
}

// ─────────────────────────────────────────────
// ROUTE MODAL
// ─────────────────────────────────────────────
function changeVehicleMo(rid) {
  const r=routes.find(x=>x.id===rid); if(!r) return;
  const currentV=rV(r);
  // Pool = in master, no route or on this route, not departed
  const pool=vehicles.filter(v=>(!v.routeId||v.routeId===rid)&&v.status!=='out'&&!v.masterIncomplete&&masterLookup(v.number)&&!masterLookup(v.number).incomplete&&v.id!==(currentV?.id));
  // Also show planned vehicles from master not yet active today
  let html=`<div style="font-size:12px;color:var(--mut);margin-bottom:10px">Select replacement vehicle for <strong>${esc(r.routeNo)}</strong>${currentV?` · Current: <span style="font-family:var(--mono)">${esc(currentV.number)}</span> will be released to pool`:''}</div>`;
  if(!pool.length) {
    html+=`<div style="text-align:center;padding:14px;font-size:12px;color:var(--dim)">No pool vehicles available</div>`;
  } else {
    html+=pool.map(v=>`<div onclick="doChangeVehicle('${rid}','${v.id}')" style="background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
      <div>
        <div style="font-family:var(--mono);font-weight:800;font-size:14px">${esc(v.number)}</div>
        <div style="font-size:10px;color:var(--mut);margin-top:1px">${esc(v.vendor&&v.vendor!=='—'?v.vendor:'—')} · ${esc(v.type)} · <span style="color:${SC[v.status]}">${SL[v.status]}</span></div>
      </div>
      <span style="font-size:18px;color:var(--blu)">→</span>
    </div>`).join('');
  }
  html+=`<button class="btn-s" onclick="cMo()">Cancel</button>`;
  oMo('Change Vehicle', html);
}
function doChangeVehicle(rid, newVid) {
  const r=routes.find(x=>x.id===rid); if(!r) return;
  const oldV=rV(r);
  const newV=vehicles.find(x=>x.id===newVid); if(!newV) return;
  // Release old vehicle to pool
  if(oldV) { oldV.routeId=null; }
  // Assign new vehicle to route
  newV.routeId=rid;
  r.vehicleId=newVid;
  r.status=newV.status;
  log(r.routeNo,'🔀 Vehicle changed: '+(oldV?oldV.number:'none')+' → '+newV.number,'var(--blu)');
  save(); cMo(); renderAll();
  toast('✅ '+newV.number+' assigned to '+r.routeNo+(oldV?' · '+oldV.number+' released to pool':''));
}
function releaseVehicle(rid) {
  const r=routes.find(x=>x.id===rid); if(!r) return;
  const v=rV(r); if(!v){ toast('No vehicle assigned','err'); return; }
  // Release vehicle to pool, make route short
  v.routeId=null;
  r.vehicleId=null;
  r.status='short';
  log(r.routeNo,'📤 Vehicle released: '+v.number+' → pool','var(--org)');
  save(); cMo(); renderAll();

function openRMo(rid) {
  const r=routes.find(x=>x.id===rid); if(!r) return;
  const v=rV(r), rs=rSt(r);
  const dchip=r.destType==='outstation'
    ?`<span style="background:var(--bld);color:var(--blu);border:1px solid var(--blu);border-radius:4px;padding:1px 6px;font-size:9px;font-weight:800">OS</span>`
    :`<span style="background:var(--acd);color:var(--acc);border:1px solid var(--acc);border-radius:4px;padding:1px 6px;font-size:9px;font-weight:800">L</span>`;

  const pills=(r.stores||[]).map((s,i)=>`<span style="background:var(--sur2);border:1px solid var(--bdr);border-radius:5px;padding:3px 8px;font-size:11px;display:inline-flex;align-items:center;gap:4px">${esc(s)}${currentRole==='transport'?`<span onclick="rmStoreMo('${rid}',${i})" style="color:var(--red);font-size:13px;cursor:pointer;line-height:1">×</span>`:''}</span>`).join('');

  let html=`<div style="background:var(--sur2);border-radius:9px;padding:10px 12px;margin-bottom:12px">

    ${r.eta?`<div style="font-size:11px;color:var(--mut);margin-top:5px">ETA: ${esc(r.eta)}</div>`:''}
    ${r.notes?`<div style="font-size:11px;color:var(--acc);margin-top:2px">${esc(r.notes)}</div>`:''}
  </div>`;

  if(!v) {
    html+=`<div class="al al-o">⚠️ No vehicle assigned</div>`;
    if(currentRole==='transport') html+=`<button class="act-btn btn-p" onclick="cMo();openAssignMo('${rid}')">🚛 Assign Vehicle</button>`;
  } else {
    const yd=v.isCarryOver?'<span class="yday">YDAY</span>':'';
    html+=`<div style="background:var(--sur2);border-radius:8px;padding:10px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-family:var(--mono);font-weight:800;font-size:15px">${esc(v.number)}${yd}</div>
        <div style="font-size:11px;color:var(--mut);margin-top:1px">${esc(v.type)} · ${esc(v.vendor!=='—'?v.vendor:'—')}${v.dock&&v.dock!=='—'?' · Dock '+esc(v.dock):''}</div>
      </div>
      <span class="rb rb-${v.status}">${SI[v.status]} ${SL[v.status]}</span>
    </div>`;

    if(v.status==='breakdown') {
      html+=`<div class="al al-r" style="margin-bottom:10px">🚨 Breakdown since ${v.times?.breakdown||'—'}</div>`;
      if(currentRole==='transport') {
        html+=`<button class="act-btn" style="background:var(--org);color:#fff" onclick="resolveBreak('${v.id}','resume')">🔧 Resolved — Resume</button>`;
        html+=`<button class="act-btn" style="background:var(--blu);color:#fff" onclick="resolveBreak('${v.id}','release')">🔄 Release Route</button>`;
      }
    } else if(v.status==='out') {
      html+=`<div style="text-align:center;padding:12px;color:var(--grn);font-weight:700">✅ Departed at ${v.times?.out||'—'}</div>`;
    } else {
      // Timeline
      const ci=FLOW.indexOf(v.status);
      html+=`<div class="tl">${['inside','dock','loaded','out'].map((s,i)=>{ const si=FLOW.indexOf(s),done=ci>=si,cur=v.status===s; return `<div class="tl-s${done?' done':''}${cur?' cur':''}"><div class="tl-d">${done?'✓':''}</div><div class="tl-l">${['In','Dock','Loaded','Out'][i]}</div><div class="tl-t">${v.times?.[s]||''}</div></div>`; }).join('')}</div>`;
      const next=FLOW[ci+1];
      if(next&&currentRole!=='leader') {
        const canAct=(currentRole==='gate'&&['planned','loaded'].includes(v.status))
                    ||(currentRole==='warehouse'&&['inside','dock'].includes(v.status))
                    ||(currentRole==='transport'&&v.status!=='inside'); // transport cannot mark dock from routes tab
        if(canAct) {
          const bc=next==='inside'?'var(--blu)':next==='dock'?'var(--pur)':next==='loaded'?'var(--grn)':'var(--acc)';
          const tc=next==='out'?'#000':'#fff';
          if(next==='out') html+=`<button class="act-btn" style="background:var(--acc);color:#000" onclick="confirmOut('${v.id}')">✅ Mark Gate OUT</button>`;
          else html+=`<button class="act-btn" style="background:${bc};color:${tc}" onclick="updateStatus('${v.id}','${next}')">${SI[next]} Mark: ${SL[next]}</button>`;
        }
        if(currentRole==='transport') html+=`<button class="act-btn" style="background:var(--red);color:#fff" onclick="updateStatus('${v.id}','breakdown')">🚨 Report Breakdown</button>`;
      }
    }
    if(currentRole==='transport') {
      html+=`<div class="dvd"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px">
          <button class="btn-s" style="margin-bottom:0" onclick="cMo();openReassignMo('${rid}')">🔄 Move Vehicle</button>
          <button class="btn-s" style="margin-bottom:0" onclick="cMo();openSplitMo('${rid}')">✂️ Split Route</button>
          <button class="btn-s" style="margin-bottom:0" onclick="cMo();changeVehicleMo('${rid}')">🔀 Change Vehicle</button>
          <button class="btn-s" style="margin-bottom:0;color:var(--org);border-color:var(--org)" onclick="releaseVehicle('${rid}')">📤 Release Vehicle</button>
        </div>
        <button class="btn-d" onclick="delRoute('${rid}')">🗑 Delete Route</button>`;
    }
  }
  if(currentRole==='leader') html+=`<button class="btn-s" onclick="cMo()">Close</button>`;
  oMo(esc(r.city)+' — '+esc(r.routeNo), html);
}
function confirmOut(vid) {

    <div style="background:var(--sur2);border-radius:8px;padding:12px;margin-bottom:14px">

}
function resolveBreak(vid, action) {
  const v=vehicles.find(x=>x.id===vid); if(!v) return;
  if(action==='resume') {
    v.status=v.prevStatus||'planned'; v.times={...v.times,breakdown_resolved:nowTime()};
    const r=vR(v); if(r) r.status=v.status;
    log(v.number,'🔧 Breakdown resolved',SC.inside);
    save(); cMo(); toast(v.number+' resumed'); renderAll();
  } else {
    unlink(vid);
    log(v.number,'🔄 Route released',SC.breakdown);
    save(); cMo(); toast('Route released'); renderAll();
  }
}
