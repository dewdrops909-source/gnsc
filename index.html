function uploadIndentMaster() {
  const text=(document.getElementById('indentMasterIn')?.value||'').trim();
  if(!text){ toast('⚠️ Paste indent data first','err'); return; }
  let added=0;
  text.split('\n').filter(l=>l.trim()).forEach(line=>{
    const [rawDate, countRaw]=line.split('\t').map(c=>c.trim());
    if(!rawDate||!countRaw) return;
    const count=parseInt(countRaw); if(!count||count<1) return;
    // Parse DD-Mon-YY or YYYY-MM-DD
    let dateKey='';
    if(rawDate.match(/^\d{4}-\d{2}-\d{2}$/)) {
      dateKey=rawDate;
    } else {
      const d=new Date(rawDate);
      if(!isNaN(d)) dateKey=d.toISOString().slice(0,10);
    }
    if(!dateKey) return;
    masterIndent[dateKey]=count; added++;
  });
  saveMasters();
  document.getElementById('indentMasterIn').value='';
  const st=document.getElementById('indent_stats');
  if(st){ st.innerHTML=`<div class="al al-g">✅ ${added} days of indent data saved</div>`; st.style.display='block'; }
  log('MASTER','📦 Indent plan uploaded: '+added+' days','var(--acc)');
  renderMasters(); toast('✅ '+added+' days saved');
}

  const todaySnap={
    date:TODAY,

    vendors:(()=>{ const m={}; vehicles.filter(v=>!v.isCarryOver).forEach(v=>{ const k=v.vendor&&v.vendor!=='—'?v.vendor:'Unknown'; m[k]=(m[k]||0)+1; }); return m; })(),
    breakdowns:actLog.filter(a=>a.date===TODAY&&a.msg.includes('Breakdown')).map(a=>({vehicle:a.who,time:a.time})),
    delayed:(()=>{ const cut_os=t2m(CUT_OS),cut_l=t2m(CUT_L); return vehicles.filter(v=>v.status==='out'&&v.times?.out&&t2m(v.times.out)>(vDT(v)==='outstation'?cut_os:cut_l)).map(v=>({vehicle:v.number,time:v.times.out,vendor:v.vendor})); })(),

  const W=Math.max(1,indDays.length-1), H=100;
  function iX(i){ return Math.round((i/W)*100); }
  function iY(v){ return Math.round(H-(v/indMax)*H); }
  const planPts=indDays.map((d,i)=>`${iX(i)},${iY(d.indentPlan||0)}`).join(' ');
  const actPts =indDays.map((d,i)=>`${iX(i)},${iY(d.indentActual||0)}`).join(' ');

    <!-- INDENT CHART -->
    <div style="background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:13px;margin-bottom:10px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-weight:800;font-size:13px">📦 Indent — Planned vs Actual</div>
        <div style="display:flex;gap:8px">
          <div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:2px;background:var(--bdr);border-radius:1px"></div><span style="font-size:10px;color:var(--mut)">Planned</span></div>
          <div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:2px;background:var(--acc);border-radius:1px"></div><span style="font-size:10px;color:var(--mut)">Actual</span></div>
        </div>
      </div>
      ${indSvg}
    </div>

    <!-- VEHICLE USAGE CHART -->
    <div style="background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:13px;margin-bottom:10px">
      <div style="font-weight:800;font-size:13px;margin-bottom:6px">🚛 Daily Vehicle Usage</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px">${vendorLegend}<div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:2px;background:#58A6FF;border-radius:1px"></div><span style="font-size:10px;color:var(--mut)">Total</span></div></div>
      ${vSvg}
    </div>

    <!-- BREAKDOWNS -->
    <div style="background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:13px;margin-bottom:10px">
      <div onclick="_bkDetail=!_bkDetail;renderAnalytics()" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer">
        <div style="font-weight:800;font-size:13px">🚨 Breakdowns <span style="font-family:var(--mono);font-size:16px;color:var(--red)">${allBK.length}</span> <span style="font-size:11px;font-weight:400;color:var(--mut)">this month</span></div>
        <span style="color:var(--dim);font-size:14px">${_bkDetail?'▴':'▾'}</span>
      </div>
      ${bkByDay.length?`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:8px">${bkByDay.map(d=>`<span style="background:var(--rdd);border:1px solid var(--red);border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700;color:var(--red)">${d.date} · ${d.count}</span>`).join('')}</div>`:''}
      ${_bkDetail&&allBK.length?`<div style="margin-top:10px;border-top:1px solid var(--bdr);padding-top:10px">
        ${allBK.map(b=>`<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--bdr2);font-size:11px">
          <span style="font-family:var(--mono);font-weight:800;color:var(--red);flex:2">${esc(b.vehicle)}</span>
          <span style="color:var(--mut);flex:2">${b.date}</span>
          <span style="font-family:var(--mono);color:var(--dim);flex:1">${b.time||'—'}</span>
        </div>`).join('')}
      </div>`:''}
      ${!allBK.length?`<div style="font-size:11px;color:var(--grn);font-weight:700;margin-top:6px">✅ No breakdowns this month</div>`:''}
    </div>

    <!-- DELAYED DISPATCH TABLE -->
    <div style="background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:13px;margin-bottom:10px">
      <div style="font-weight:800;font-size:13px;margin-bottom:10px">⏰ Delayed Dispatches <span style="font-size:11px;font-weight:400;color:var(--mut)">· past cutoff time</span></div>
      ${allDelayed.length?`
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse;font-size:11px">
            <thead><tr style="background:var(--sur2);border-bottom:1px solid var(--bdr)">
              <th style="padding:6px 8px;text-align:left;font-weight:800;color:var(--mut);white-space:nowrap">Date</th>
              <th style="padding:6px 8px;text-align:center;font-weight:800;color:var(--red)">Delayed</th>
              <th style="padding:6px 8px;text-align:left;font-weight:800;color:var(--mut)">Vehicles</th>
            </tr></thead>
            <tbody>
              ${allDelayed.map(d=>`<tr style="border-bottom:1px solid var(--bdr2)">
                <td style="padding:6px 8px;font-family:var(--mono);font-weight:700">${d.date}</td>
                <td style="padding:6px 8px;text-align:center;font-family:var(--mono);font-weight:800;color:var(--red)">${d.delayed.length}</td>
                <td style="padding:6px 8px;color:var(--mut)">${d.delayed.map(v=>`<span style="font-family:var(--mono);font-size:10px;margin-right:6px;color:var(--txt)">${esc(v.vehicle)} <span style="color:var(--red)">${v.time}</span></span>`).join('')}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>`
      :`<div style="font-size:11px;color:var(--grn);font-weight:700">✅ No delayed dispatches this month</div>`}
    </div>
    <div style="height:16px"></div>`;
}

// ─────────────────────────────────────────────
// LOG
// ─────────────────────────────────────────────
function renderLog() {
  const el=document.getElementById('pg-log'); if(!el||!el.classList.contains('on')) return;
  el.innerHTML=`<div class="pg-h"><div><div class="pg-t">Activity Log</div><div class="pg-s">${actLog.length} events · 24 hrs retained</div></div></div>
    <div style="background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:10px 12px">
      ${actLog.length?actLog.map(a=>`<div style="display:flex;gap:9px;padding:8px 0;border-bottom:1px solid var(--bdr2)"><div style="width:7px;height:7px;border-radius:50%;background:${a.color};margin-top:5px;flex-shrink:0"></div><div><div style="font-size:12px"><strong>${esc(a.who)}</strong> — ${esc(a.msg)}</div><div style="font-family:var(--mono);font-size:10px;color:var(--mut)">${a.time} · ${a.date||''}</div></div></div>`).join('')
      :`<div class="empty"><div class="empty-ic">📋</div><div class="empty-t">No events logged</div></div>`}
    </div><div style="height:16px"></div>`;
}
</script>
</body>
</html>
