// ROUTE MODAL
// ─────────────────────────────────────────────
function changeVehicleMo(rid) {
  const r=routes.find(x=>x.id===rid); if(!r) return;
  const currentV=rV(r);
  // Pool = in master, no route or on this route, not departed
  const pool=vehicles.filter(v=>(!v.routeId||v.routeId===rid)&&v.status!=='out'&&!v.masterIncomplete&&masterLookup(v.number)&&!masterLookup(v.number).incomplete&&v.id!==(currentV?.id));
  // Also show planned vehicles from master not yet active today
  let html=`<div style="font-size:12px;color:var(--mut);margin-bottom:10px">Select replacement vehicle for <strong>${esc(r.routeNo)}</strong>${currentV?` · Current: <span style="font-family:var(--mono)">${esc(currentV.number)}</span> will be released to pool`:''}</div>`;
  if(!pool.length) {
    html+=`<div style="text-align:center;padding:14px;font-size:12px;color:var(--dim)">No pool vehicles available</div>`;
  } else {
    html+=pool.map(v=>`<div onclick="doChangeVehicle('${rid}','${v.id}')" style="background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
      <div>
        <div style="font-family:var(--mono);font-weight:800;font-size:14px">${esc(v.number)}</div>
        <div style="font-size:10px;color:var(--mut);margin-top:1px">${esc(v.vendor&&v.vendor!=='—'?v.vendor:'—')} · ${esc(v.type)} · <span style="color:${SC[v.status]}">${SL[v.status]}</span></div>
      </div>
      <span style="font-size:18px;color:var(--blu)">→</span>
    </div>`).join('');
  }
  html+=`<button class="btn-s" onclick="cMo()">Cancel</button>`;
  oMo('Change Vehicle', html);
}
function doChangeVehicle(rid, newVid) {
  const r=routes.find(x=>x.id===rid); if(!r) return;
  const oldV=rV(r);
  const newV=vehicles.find(x=>x.id===newVid); if(!newV) return;
  // Release old vehicle to pool
  if(oldV) { oldV.routeId=null; }
  // Assign new vehicle to route — clear unplanned flags so warehouse can dock it
  newV.routeId=rid;
  newV.isUnplanned=false;
  newV.masterIncomplete=false;
  r.vehicleId=newVid;
  r.status=newV.status;
  log(r.routeNo,'🔀 Vehicle changed: '+(oldV?oldV.number:'none')+' → '+newV.number,'var(--blu)');
  save(); cMo(); renderAll();
  toast('✅ '+newV.number+' assigned to '+r.routeNo+(oldV?' · '+oldV.number+' released to pool':''));
}
function releaseVehicle(rid) {
  const r=routes.find(x=>x.id===rid); if(!r) return;
  const v=rV(r); if(!v){ toast('No vehicle assigned','err'); return; }
  // Release vehicle to pool, make route short
  v.routeId=null;
  r.vehicleId=null;
  r.status='short';
  log(r.routeNo,'📤 Vehicle released: '+v.number+' → pool','var(--org)');
  save(); cMo(); renderAll();
  toast('📤 '+v.number+' released to pool · '+r.routeNo+' is now Short');
}
function openRMo(rid) {
  const r=routes.find(x=>x.id===rid); if(!r) return;
  const v=rV(r), rs=rSt(r);
  const dchip=r.destType==='outstation'
    ?`<span style="background:var(--bld);color:var(--blu);border:1px solid var(--blu);border-radius:4px;padding:1px 6px;font-size:9px;font-weight:800">OS</span>`
    :`<span style="background:var(--acd);color:var(--acc);border:1px solid var(--acc);border-radius:4px;padding:1px 6px;font-size:9px;font-weight:800">L</span>`;

  const pills=(r.stores||[]).map((s,i)=>`<span style="background:var(--sur2);border:1px solid var(--bdr);border-radius:5px;padding:3px 8px;font-size:11px;display:inline-flex;align-items:center;gap:4px">${esc(s)}${currentRole==='transport'?`<span onclick="rmStoreMo('${rid}',${i})" style="color:var(--red);font-size:13px;cursor:pointer;line-height:1">×</span>`:''}</span>`).join('');

  let html=`<div style="background:var(--sur2);border-radius:9px;padding:10px 12px;margin-bottom:12px">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px"><span style="font-size:15px;font-weight:800">${esc(r.city)}</span>${dchip}<span class="rb rb-${rs}">${SI[rs]} ${SL[rs]}</span></div>
    ${r.stores?.length?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px">${pills}</div>`:''}
    ${currentRole==='transport'?`<button onclick="addStoreMo('${rid}')" style="background:transparent;border:1px dashed var(--acc);color:var(--acc);border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700;cursor:pointer">+ Add Store</button>`:''}
    ${r.eta?`<div style="font-size:11px;color:var(--mut);margin-top:5px">ETA: ${esc(r.eta)}</div>`:''}
    ${r.notes?`<div style="font-size:11px;color:var(--acc);margin-top:2px">${esc(r.notes)}</div>`:''}
  </div>`;

  if(!v) {
    html+=`<div class="al al-o">⚠️ No vehicle assigned</div>`;
    if(currentRole==='transport') html+=`<button class="act-btn btn-p" onclick="cMo();openAssignMo('${rid}')">🚛 Assign Vehicle</button>`;
  } else {
    const yd=v.isCarryOver?'<span class="yday">YDAY</span>':'';
    html+=`<div style="background:var(--sur2);border-radius:8px;padding:10px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-family:var(--mono);font-weight:800;font-size:15px">${esc(v.number)}${yd}</div>
        <div style="font-size:11px;color:var(--mut);margin-top:1px">${esc(v.type)} · ${esc(v.vendor!=='—'?v.vendor:'—')}${v.dock&&v.dock!=='—'?' · Dock '+esc(v.dock):''}</div>
      </div>
      <span class="rb rb-${v.status}">${SI[v.status]} ${SL[v.status]}</span>
    </div>`;

    if(v.status==='breakdown') {
      html+=`<div class="al al-r" style="margin-bottom:10px">🚨 Breakdown since ${v.times?.breakdown||'—'}</div>`;
      if(currentRole==='transport') {
        html+=`<button class="act-btn" style="background:var(--org);color:#fff" onclick="resolveBreak('${v.id}','resume')">🔧 Resolved — Resume</button>`;
        html+=`<button class="act-btn" style="background:var(--blu);color:#fff" onclick="resolveBreak('${v.id}','release')">🔄 Release Route</button>`;
      }
    } else if(v.status==='out') {
      html+=`<div style="text-align:center;padding:12px;color:var(--grn);font-weight:700">✅ Departed at ${v.times?.out||'—'}</div>`;
    } else {
      // Timeline
      const ci=FLOW.indexOf(v.status);
      html+=`<div class="tl">${['inside','dock','loaded','out'].map((s,i)=>{ const si=FLOW.indexOf(s),done=ci>=si,cur=v.status===s; return `<div class="tl-s${done?' done':''}${cur?' cur':''}"><div class="tl-d">${done?'✓':''}</div><div class="tl-l">${['In','Dock','Loaded','Out'][i]}</div><div class="tl-t">${v.times?.[s]||''}</div></div>`; }).join('')}</div>`;
      const next=FLOW[ci+1];
      if(next&&currentRole!=='leader') {
        const canAct=(currentRole==='gate'&&['planned','loaded'].includes(v.status))
                    ||(currentRole==='warehouse'&&['inside','dock'].includes(v.status))
                    ||(currentRole==='transport'&&v.status!=='inside'); // transport cannot mark dock from routes tab
        if(canAct) {
          const bc=next==='inside'?'var(--blu)':next==='dock'?'var(--pur)':next==='loaded'?'var(--grn)':'var(--acc)';
          const tc=next==='out'?'#000':'#fff';
          if(next==='out') html+=`<button class="act-btn" style="background:var(--acc);color:#000" onclick="confirmOut('${v.id}')">✅ Mark Gate OUT</button>`;
          else html+=`<button class="act-btn" style="background:${bc};color:${tc}" onclick="updateStatus('${v.id}','${next}')">${SI[next]} Mark: ${SL[next]}</button>`;
        }
        if(currentRole==='transport') html+=`<button class="act-btn" style="background:var(--red);color:#fff" onclick="updateStatus('${v.id}','breakdown')">🚨 Report Breakdown</button>`;
      }
    }
    if(currentRole==='transport') {
      html+=`<div class="dvd"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px">
          <button class="btn-s" style="margin-bottom:0" onclick="cMo();openReassignMo('${rid}')">🔄 Move Vehicle</button>
          <button class="btn-s" style="margin-bottom:0" onclick="cMo();openSplitMo('${rid}')">✂️ Split Route</button>
          <button class="btn-s" style="margin-bottom:0" onclick="cMo();changeVehicleMo('${rid}')">🔀 Change Vehicle</button>
          <button class="btn-s" style="margin-bottom:0;color:var(--org);border-color:var(--org)" onclick="releaseVehicle('${rid}')">📤 Release Vehicle</button>
        </div>
        <button class="btn-d" onclick="delRoute('${rid}')">🗑 Delete Route</button>`;
    }
  }
  if(currentRole==='leader') html+=`<button class="btn-s" onclick="cMo()">Close</button>`;
  oMo(esc(r.city)+' — '+esc(r.routeNo), html);
}
function confirmOut(vid) {
  const v=vehicles.find(x=>x.id===vid); if(!v) return;
  const r=vR(v); cMo();
  setTimeout(()=>oMo('Confirm Gate OUT',`
    <div style="background:var(--sur2);border-radius:8px;padding:12px;margin-bottom:12px">
      <div style="font-family:var(--mono);font-size:18px;font-weight:800;color:var(--acc)">${esc(v.number)}</div>
      ${r?`<div style="font-size:11px;color:var(--mut);margin-top:3px">${esc(r.city)} · ${r.stores?.length||0} stores</div>`:''}
    </div>
    <div class="field" style="margin-bottom:14px">
      <label style="font-size:11px;font-weight:800;color:var(--mut);text-transform:uppercase;letter-spacing:.5px">🌡️ Vehicle Temperature (°C)</label>
      <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
        <input type="number" id="gateTemp" step="0.1" placeholder="e.g. 2.5"
          style="flex:1;background:var(--sur2);border:2px solid var(--bdr);border-radius:8px;padding:12px 14px;color:var(--txt);font-family:var(--mono);font-size:18px;font-weight:800;outline:none;text-align:center"
          oninput="checkTempColor(this)">
        <span style="font-size:13px;font-weight:700;color:var(--mut)">°C</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:5px;font-size:10px;color:var(--mut)">
        <span>Acceptable range: <strong style="color:var(--grn)">-2°C to 4°C</strong></span>
        <span id="tempStatus"></span>
      </div>
    </div>
    <button class="act-btn" style="background:var(--acc);color:#000" onclick="doGateOut('${vid}')">✅ Confirm Gate OUT</button>
    <button class="btn-s" onclick="cMo()">Cancel</button>
  `),200);
}
function checkTempColor(inp) {
  const t=parseFloat(inp.value);
  const status=document.getElementById('tempStatus');
  if(isNaN(t)) { inp.style.borderColor='var(--bdr)'; if(status) status.textContent=''; return; }
  if(t>=-2&&t<=4) {
    inp.style.borderColor='var(--grn)';
    if(status) { status.textContent='✅ Within range'; status.style.color='var(--grn)'; }
  } else {
    inp.style.borderColor='var(--red)';
    if(status) { status.textContent='⚠️ Out of range!'; status.style.color='var(--red)'; }
  }
}
function doGateOut(vid) {
  const v=vehicles.find(x=>x.id===vid); if(!v) return;
  const tempInput=document.getElementById('gateTemp');
  const temp=parseFloat(tempInput?.value||'');

  if(isNaN(temp)) { toast('⚠️ Enter vehicle temperature before gate out','err'); return; }

  const inRange=temp>=-2&&temp<=4;

  if(!inRange) {
    // Send alert to transport but still do gate out
    const r=vR(v);
    const msg=`🌡️ Temp Alert: ${v.number} departed at ${temp}°C (outside -2 to 4°C range)${r?' · '+r.city:''}`;
    pushNotifToAll('transport','⚠️ Temperature Alert — '+v.number, `Departed at ${temp}°C — outside acceptable range (-2°C to 4°C)${r?' · '+r.city:''}`);
    log(v.number, msg,'var(--red)');
    toast('⚠️ Temp alert sent to transport — doing Gate OUT');
  } else {
    log(v.number,`🌡️ Temp OK: ${temp}°C · Gate OUT`,'var(--grn)');
  }

  // Record temp on vehicle
  v.temp=temp;
  v.tempOk=inRange;

  // Do gate out
  updateStatus(vid,'out');
  cMo();
  setTimeout(()=>{
    const tv=vehicles.filter(v=>!v.isCarryOver);
    if(tv.length>0&&tv.every(v=>v.status==='out')) sendLeaderStatusPush();
  },500);
}
function resolveBreak(vid, action) {
  const v=vehicles.find(x=>x.id===vid); if(!v) return;
  if(action==='resume') {
    v.status=v.prevStatus||'planned'; v.times={...v.times,breakdown_resolved:nowTime()};
    const r=vR(v); if(r) r.status=v.status;
    log(v.number,'🔧 Breakdown resolved',SC.inside);
    save(); cMo(); toast(v.number+' resumed'); renderAll();
  } else {
    unlink(vid);
    log(v.number,'🔄 Route released',SC.breakdown);
    save(); cMo(); toast('Route released'); renderAll();
  }
}
function rmStoreMo(rid, idx) {
  const r=routes.find(x=>x.id===rid); if(!r) return;
  r.stores.splice(idx,1);
  log(r.routeNo,'🏪 Store removed','var(--red)');
  save(); openRMo(rid); renderRoutes();
}

function doAddStore(rid) {

function openAssignMo(rid) {
  const r=routes.find(x=>x.id===rid); if(!r) return;
  // Free = no route, or route is departed, and not themselves departed or breakdown
  const free=vehicles.filter(v=>{
    if(v.status==='out'||v.status==='breakdown') return false;
    if(!v.routeId) return true;
    if(v.routeId===rid) return false; // already on this route
    const vr=vR(v); return vr?.status==='out';
  });
  let html=`<div style="font-size:12px;color:var(--mut);margin-bottom:12px">Assigning to: <strong>${esc(r.city)} ${esc(r.routeNo)}</strong></div>`;
  if(free.length) {
    html+=free.map(v=>`<div onclick="doAssign('${v.id}','${rid}')" style="background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
      <div><div style="font-family:var(--mono);font-weight:800;font-size:14px">${esc(v.number)}${prechillBadge(v)}</div><div style="font-size:10px;color:var(--mut)">${esc(v.vendor&&v.vendor!=='—'?v.vendor:'—')} · ${esc(v.type)} · ${SL[v.status]}</div></div>
      <div style="font-size:18px;color:var(--acc)">→</div>
    </div>`).join('');
  } else { html+=`<div style="background:var(--sur2);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--mut);margin-bottom:12px">No free vehicles in pool — enter a new vehicle number below</div>`; }
  html+=`<div class="dvd"></div>
    <div style="font-size:10px;font-weight:700;color:var(--mut);text-transform:uppercase;margin-bottom:8px">Enter vehicle number</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:10px">
      <input id="anNum" type="text" placeholder="Vehicle No. e.g. MH04AB1234" autocapitalize="characters" oninput="this.value=this.value.toUpperCase();vLookupAssign(this.value)" list="dl-an" style="background:var(--sur2);border:1px solid var(--bdr);border-radius:7px;padding:11px 12px;color:var(--txt);font-family:var(--mono);font-size:15px;font-weight:700;outline:none;width:100%">
      <input id="anVnd" type="text" placeholder="Transporter name" style="background:var(--sur2);border:1px solid var(--bdr);border-radius:7px;padding:11px 12px;color:var(--txt);font-family:'Inter',sans-serif;font-size:14px;outline:none;width:100%">
      <div id="anBan" style="display:none;font-size:11px;font-weight:600;padding:7px 10px;border-radius:7px"></div>
    </div>
    <datalist id="dl-an">${masterVehicles.map(m=>`<option value="${esc(m.number)}">`).join('')}</datalist>
    <button class="btn-p" onclick="doAssignNew('${rid}')">✅ Assign Vehicle</button>
    <button class="btn-s" onclick="cMo()">Cancel</button>`;
  oMo('Assign Vehicle — '+esc(r.city), html);
}
function vLookupAssign(num) {
  const m=masterLookup(num); if(!m) return;
  const vnd=document.getElementById('anVnd'); if(vnd&&m.vendor&&m.vendor!=='—') vnd.value=m.vendor;
  const ban=document.getElementById('anBan'); if(ban){ ban.style.cssText='display:block;background:var(--bld);border:1px solid var(--blu);border-radius:7px;color:var(--blu)'; ban.textContent='✓ Known — '+m.vendor+' · '+m.type; }
}
function doAssign(vid, rid) {
  const v=vehicles.find(x=>x.id===vid), r=routes.find(x=>x.id===rid); if(!v||!r) return;
  if(v.routeId){ const old=routes.find(x=>x.id===v.routeId); if(old){old.vehicleId=null;old.status='short';} }
  link(vid,rid);
  log(v.number,'🔗 Assigned to '+r.routeNo,'var(--blu)');
  save(); cMo(); toast(v.number+' → '+r.city); renderAll();
}
function doAssignNew(rid) {
  const r=routes.find(x=>x.id===rid); if(!r) return;
  const num=(document.getElementById('anNum')?.value||'').trim().toUpperCase();
  const vnd=(document.getElementById('anVnd')?.value||'').trim()||'—';
  if(!num){ toast('⚠️ Enter vehicle number','err'); return; }
  if(!validVNum(num)){ toast('⚠️ Invalid format — e.g. MH04AB1234 or MH04A1234','err'); return; }
  if(vehicles.find(v=>v.number===num&&v.status!=='out')){ toast('⚠️ Vehicle already active','err'); return; }
  const m=masterLookup(num);
  const v={id:genId(),number:num,type:m?.type||'24ft',vendor:vnd!=='—'?vnd:(m?.vendor||'—'),dock:'—',routeId:null,status:'planned',times:{planned:nowTime()},date:TODAY,createdAt:Date.now()};
  vehicles.push(v); link(v.id,rid); masterUpsert(num,v.vendor,v.type);
  log(num,'➕ New → '+r.routeNo,'var(--blu)');
  save(); cMo(); toast(num+' → '+r.city); renderAll();
}
function openPoolAssign(vid) {
  const v=vehicles.find(x=>x.id===vid); if(!v) return;
  const free=routes.filter(r=>!r.vehicleId&&!r.isCarryOver);
  const coNote='';
  let html=`${coNote}<div style="font-size:12px;color:var(--mut);margin-bottom:12px">Assign <span style="font-family:var(--mono);font-weight:800;color:var(--pur)">${esc(v.number)}</span> to a route</div>`;
  if(!free.length) html+=`<div style="text-align:center;padding:14px;font-size:12px;color:var(--mut)">No unassigned routes. Add a route first.</div>`;
  else html+=free.map(r=>`<div onclick="doAssign('${vid}','${r.id}')" style="background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
    <div><div style="font-weight:700;font-size:13px">${esc(r.city)} <span style="font-family:var(--mono);font-size:11px;color:var(--mut)">${esc(r.routeNo)}</span></div><div style="font-size:10px;color:var(--mut)">${r.stores?.join(' → ')||'No stores'} · ${r.eta||'No ETA'}</div></div>
    <div style="font-size:16px;color:var(--acc)">→</div>
  </div>`).join('');
  html+=`<button class="btn-s" onclick="cMo()">Cancel</button>`;
  oMo('Assign '+esc(v.number), html);
}
function openReassignMo(rid) {
  const r=routes.find(x=>x.id===rid); if(!r) return;
  const v=rV(r); if(!v) return;
  const others=routes.filter(x=>x.id!==rid);
  const freeR=others.filter(x=>!x.vehicleId);
  const takenR=others.filter(x=>x.vehicleId);
  let html=`<div style="font-size:12px;color:var(--mut);margin-bottom:12px">Moving <span style="font-family:var(--mono);font-weight:800">${esc(v.number)}</span> from <strong>${esc(r.city)}</strong></div>`;
  if(freeR.length) {
    html+=`<div class="sec" style="margin-bottom:7px">→ Move to unassigned route</div>`;
    html+=freeR.map(rt=>`<div onclick="doMove('${v.id}','${rid}','${rt.id}')" style="background:var(--sur2);border:1px solid var(--org);border-radius:8px;padding:10px 12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <div><div style="font-weight:700;font-size:13px">${esc(rt.city)} <span style="font-size:9px;color:var(--org);font-weight:800">⚠️ Short</span></div><div style="font-size:10px;color:var(--mut)">${rt.stores?.join(' → ')||'No stores'}</div></div>
      <div style="color:var(--acc)">→</div>
    </div>`).join('');
  }
  if(takenR.length) {
    html+=`<div class="sec" style="margin:${freeR.length?'10px 0 7px':'0 0 7px'}">⇄ Swap with another route</div>`;
    html+=takenR.map(rt=>{ const rv=rV(rt); return `<div onclick="doSwap('${rid}','${rt.id}')" style="background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <div><div style="font-weight:700;font-size:13px">${esc(rt.city)}</div><div style="font-size:10px;color:var(--mut)">${esc(rv?.number||'—')} · ${SL[rv?.status||'planned']}</div></div>
      <div style="font-size:11px;color:var(--blu)">⇄ Swap</div>
    </div>`; }).join('');
  }
  html+=`<div class="dvd"></div><button class="btn-s" onclick="doRelease('${v.id}')">↩ Release (make route short)</button><button class="btn-s" onclick="cMo()">Cancel</button>`;
  oMo('Move Vehicle — '+esc(r.city), html);
}
function doMove(vid, fid, tid) {
  const fr=routes.find(x=>x.id===fid), to=routes.find(x=>x.id===tid), v=vehicles.find(x=>x.id===vid);
  if(!v||!fr||!to) return;
  fr.vehicleId=null; fr.status='short'; v.routeId=null; link(vid,tid);
  log(v.number,'🔄 '+fr.city+' → '+to.city,'var(--blu)');
  save(); cMo(); toast(v.number+' → '+to.city); renderAll();
}
function doSwap(aid, bid) {
  const ra=routes.find(x=>x.id===aid), rb=routes.find(x=>x.id===bid);
  if(!ra||!rb) return;
  const va=rV(ra), vb=rV(rb);
  if(va&&vb){ va.routeId=rb.id;rb.vehicleId=va.id;rb.status=va.status; vb.routeId=ra.id;ra.vehicleId=vb.id;ra.status=vb.status; }
  else if(va){ va.routeId=rb.id;rb.vehicleId=va.id;rb.status=va.status;ra.vehicleId=null;ra.status='short'; }
  else if(vb){ vb.routeId=ra.id;ra.vehicleId=vb.id;ra.status=vb.status;rb.vehicleId=null;rb.status='short'; }
  log((va?.number||'—')+'⇄'+(vb?.number||'—'),'Swapped: '+ra.city+' ⇄ '+rb.city,'var(--blu)');
  save(); cMo(); toast(ra.city+' ⇄ '+rb.city); renderAll();
}
function doRelease(vid) {
  const v=vehicles.find(x=>x.id===vid); if(!v) return;
  unlink(vid);
  log(v.number,'↩ Route released','var(--org)');
  save(); cMo(); toast('Route released'); renderAll();
}
function openSplitMo(rid) {
  const r=routes.find(x=>x.id===rid); if(!r) return;
  if(!r.stores||r.stores.length<2){ toast('⚠️ Need 2+ stores to split','err'); return; }
  const checks=r.stores.map((s,i)=>`<label style="display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--sur2);border-radius:7px;margin-bottom:6px;cursor:pointer;border:1px solid var(--bdr)">
    <input type="checkbox" id="ss_${i}" style="width:16px;height:16px;accent-color:var(--acc)">
    <span style="font-size:13px;font-weight:600">${esc(s)}</span>
  </label>`).join('');
  oMo('✂️ Split Route — '+esc(r.city),`
    <div style="font-size:12px;color:var(--mut);margin-bottom:12px">Select stores to move to the <strong>new route</strong>.</div>
    ${checks}
    <div class="field" style="margin-top:10px"><label>New Route City</label><input id="scity" type="text" value="${esc(r.city)} 2" autocapitalize="words"></div>
    <div class="field"><label>New Route No.</label><input id="srno" type="text" placeholder="${esc(r.routeNo)}-B"></div>
    <button class="btn-p" onclick="doSplit('${rid}')">✂️ Split Route</button>
    <button class="btn-s" onclick="cMo();openRMo('${rid}')">← Back</button>`);
}
function doSplit(rid) {
  const r=routes.find(x=>x.id===rid); if(!r) return;
  const sel=[...document.querySelectorAll('[id^="ss_"]')].filter(c=>c.checked).map(c=>+c.id.split('_')[1]);
  if(!sel.length){ toast('⚠️ Select at least 1 store','err'); return; }
  if(sel.length===r.stores.length){ toast('⚠️ Keep at least 1 on original','err'); return; }
  const nc=(document.getElementById('scity')?.value||'').trim()||r.city+' 2';
  const nr=(document.getElementById('srno')?.value||'').trim()||r.routeNo+'-B';
  const ns=sel.map(i=>r.stores[i]);
  r.stores=r.stores.filter((_,i)=>!sel.includes(i));
  routes.push({id:genRId(),routeNo:nr,city:nc,stores:ns,destType:r.destType,eta:r.eta,notes:r.notes,vehicleId:null,status:'short',date:TODAY,createdAt:Date.now()});
  log(r.routeNo,'✂️ Split → '+nr,'var(--pur)');
  save(); cMo(); toast('Split → '+nr); renderRoutes();
}
function delRoute(rid) {
  const r=routes.find(x=>x.id===rid); if(!confirm('Delete route '+r?.city+'?')) return;
  const v=rV(r); if(v) v.routeId=null;
  routes=routes.filter(x=>x.id!==rid);
  log(r?.routeNo||'?','🗑 Route deleted','var(--red)');
  save(); cMo(); toast('Route deleted'); renderRoutes();
}

function removeFromGNSC(vid) {
  const v=vehicles.find(x=>x.id===vid); if(!v) return;
  const r=routes.find(x=>x.vehicleId===vid);
  const stageMsg = v.status==='dock'?` (was on Dock ${v.dock})`:v.status==='loaded'?` (was Loaded on Dock ${v.dock})`:'';
  if(!confirm(`Remove ${v.number} from GNSC?${stageMsg}\n\nVehicle entry will be deleted.${r?' Route '+r.routeNo+' will become Short.':''}`)) return;
  // If linked to a route → make it Short
  if(r){ r.vehicleId=null; r.status='short'; }
  // Delete vehicle entry
  vehicles=vehicles.filter(x=>x.id!==vid);
  log(v.number,'🗑 Removed from GNSC'+stageMsg+(r?' · '+r.routeNo+' now Short':''),'var(--red)');
  save(); cMo();
  toast(v.number+' removed'+(r?' · Route '+r.routeNo+' → Short':'')); 
  renderAll();
}

function editEtaMo(vid) {
  const v=vehicles.find(x=>x.id===vid); if(!v) return;
  const r=vR(v);
  oMo('✏️ Edit ETA — '+esc(v.number),`
    <div style="font-size:12px;color:var(--mut);margin-bottom:12px">${r?esc(r.routeNo)+' · '+esc(r.city):'No route'}</div>
    <div class="field"><label>Expected Arrival Time</label>
      <input type="time" id="etaEdit" value="${v.eta||'07:00'}" style="font-size:22px;font-weight:800;font-family:var(--mono);text-align:center;background:var(--sur2);border:1px solid var(--bdr);border-radius:7px;padding:10px;color:var(--txt);outline:none;width:100%">
    </div>
    <button class="btn-p" onclick="saveEta('${vid}')">✅ Save ETA</button>
    <button class="btn-s" onclick="cMo()">Cancel</button>
  `);
}
function saveEta(vid) {
  const v=vehicles.find(x=>x.id===vid); if(!v) return;
  const val=document.getElementById('etaEdit')?.value;
  if(!val){ toast('⚠️ Enter a valid time','err'); return; }
  v.eta=val;
  const r=vR(v); if(r) r.eta=val;
  save(); cMo(); toast('✅ ETA updated: '+val); renderAll();
}
function deleteVehicleEntry(vid) {
  const v=vehicles.find(x=>x.id===vid); if(!v) return;
  // Remove from master skeleton if incomplete
  const mi=masterVehicles.findIndex(m=>m.number===v.number&&m.incomplete);
  if(mi>=0) masterVehicles.splice(mi,1);
  // Remove vehicle from vehicles array
  vehicles=vehicles.filter(x=>x.id!==vid);
  // If linked to a route, make route short
  const r=routes.find(x=>x.vehicleId===vid);
  if(r){ r.vehicleId=null; r.status='short'; }
  saveMasters(); save();
  log(v.number,'🗑 Removed from GNSC — entry deleted','var(--red)');
  toast(v.number+' removed & deleted'); cMo(); renderAll();
}
function saveMasterFromVMo(vid) {
  const v=vehicles.find(x=>x.id===vid); if(!v) return;
  const vnd=(document.getElementById('vmo_vnd')?.value||'').trim();
  const type=document.getElementById('vmo_type')?.value||'24ft';
  if(!vnd){ toast('⚠️ Enter transporter name','err'); return; }
  // Update vehicle object
  v.vendor=vnd; v.type=type;
  v.masterIncomplete=false; v.isUnplanned=false;
  // Save to master with complete details
  const ex=masterVehicles.find(m=>m.number===v.number);
  if(ex){ ex.vendor=vnd; ex.type=type; ex.incomplete=false; }
  else masterVehicles.push({number:v.number,vendor:vnd,type,incomplete:false});
  saveMasters(); save();
  log(v.number,'✅ Master updated: '+vnd+' · '+type,'var(--grn)');
  toast('✅ '+v.number+' saved to fleet master');
  renderAll(); openVMo(vid);
}
function openVMo(vid) {
  const v=vehicles.find(x=>x.id===vid); if(!v) return;

  const next=FLOW[FLOW.indexOf(v.status)+1];

    </div>

    ${v.dock&&v.dock!=='—'?`<div style="font-size:11px;color:var(--pur);margin-top:2px">🔋 Dock ${esc(v.dock)}</div>`:''}
  </div>`;

  const masterEntry = masterLookup(v.number);
  const incomplete  = !masterEntry || masterEntry.incomplete || masterEntry.vendor==='—' || masterEntry.type==='—';
  const typeOpts    = masterTypes.map(t=>`<option${t===(masterEntry?.type||'24ft')?' selected':''}>${esc(t)}</option>`).join('');

  // If not in master and unplanned — only show master update or delete
  if(v.isUnplanned && incomplete) {
    html+=`<div style="background:var(--rdd);border:1px solid var(--red);border-radius:8px;padding:11px 13px;margin-bottom:10px">
      <div style="font-size:11px;font-weight:800;color:var(--red);margin-bottom:9px">🚨 Not in fleet master — update details to proceed</div>
      <div class="field" style="margin-bottom:8px"><label>Transporter *</label>
        <input id="vmo_vnd" type="text" value="${esc(masterEntry&&masterEntry.vendor&&masterEntry.vendor!=='—'?masterEntry.vendor:v.vendor&&v.vendor!=='—'?v.vendor:'')}" placeholder="Transporter name" list="tdl-vmo" style="background:var(--sur2);border:1px solid var(--bdr);border-radius:7px;padding:9px 10px;color:var(--txt);font-family:'Inter',sans-serif;font-size:14px;outline:none;width:100%">
        <datalist id="tdl-vmo">${[...new Set([...masterVehicles.map(v=>v.vendor),...masterTrans.map(t=>t.name)].filter(x=>x&&x!=='—'))].map(v=>`<option value="${esc(v)}">`).join('')}</datalist>
      </div>
      <div class="field" style="margin-bottom:10px"><label>Vehicle Type *</label>
        <select id="vmo_type" style="width:100%;background:var(--sur2);border:1px solid var(--bdr);border-radius:7px;padding:9px 10px;color:var(--txt);font-family:'Inter',sans-serif;font-size:14px;outline:none">${typeOpts}</select>
      </div>
      <button onclick="saveMasterFromVMo('${v.id}')" style="width:100%;padding:11px;background:var(--acc);color:#000;border:none;border-radius:8px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;margin-bottom:8px">✅ Save to Fleet Master</button>
    </div>
    <div class="dvd"></div>
    <button onclick="deleteVehicleEntry('${v.id}')" style="width:100%;padding:10px;background:var(--rdd);color:var(--red);border:1px solid var(--red);border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif">🗑 Remove from GNSC & Delete Entry</button>
    <button class="btn-s" onclick="cMo()" style="margin-top:8px">Cancel</button>`;
    oMo(esc(v.number), html); return;
  }

  // Normal vehicle — show master status
  if(incomplete) {
    html+=`<div style="background:var(--rdd);border:1px solid var(--red);border-radius:8px;padding:11px 13px;margin-bottom:10px">
      <div style="font-size:11px;font-weight:800;color:var(--red);margin-bottom:9px">🚨 Master incomplete — update details</div>
      <div class="field" style="margin-bottom:8px"><label>Transporter *</label>
        <input id="vmo_vnd" type="text" value="${esc(masterEntry&&masterEntry.vendor&&masterEntry.vendor!=='—'?masterEntry.vendor:v.vendor&&v.vendor!=='—'?v.vendor:'')}" placeholder="Transporter name" list="tdl-vmo2" style="background:var(--sur2);border:1px solid var(--bdr);border-radius:7px;padding:9px 10px;color:var(--txt);font-family:'Inter',sans-serif;font-size:14px;outline:none;width:100%">
        <datalist id="tdl-vmo2">${[...new Set([...masterVehicles.map(x=>x.vendor),...masterTrans.map(t=>t.name)].filter(x=>x&&x!=='—'))].map(x=>`<option value="${esc(x)}">`).join('')}</datalist>
      </div>
      <div class="field" style="margin-bottom:10px"><label>Vehicle Type *</label>
        <select id="vmo_type" style="width:100%;background:var(--sur2);border:1px solid var(--bdr);border-radius:7px;padding:9px 10px;color:var(--txt);font-family:'Inter',sans-serif;font-size:14px;outline:none">${typeOpts}</select>
      </div>
      <button onclick="saveMasterFromVMo('${v.id}')" style="width:100%;padding:11px;background:var(--acc);color:#000;border:none;border-radius:8px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif">✅ Save to Fleet Master</button>
    </div>`;
  } else {
    html+=`<div style="background:var(--gnd);border:1px solid var(--grn);border-radius:8px;padding:8px 13px;margin-bottom:10px;font-size:11px;font-weight:700;color:var(--grn)">✅ In fleet master · ${esc(masterEntry?.vendor||'—')} · ${esc(masterEntry?.type||'—')}</div>`;

  // ETA display only for planned vehicles (not yet arrived)
  if(v.status==='planned') {
    html+=`<div style="background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;padding:10px 13px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between">

        <div style="font-size:10px;font-weight:700;color:var(--mut);margin-bottom:3px">⏰ ETA at GNSC</div>

    </div>`;
  }

  // Status actions
  if(v.status==='breakdown') {
    html+=`<div class="al al-r" style="margin-bottom:10px">🚨 Breakdown since ${v.times?.breakdown||'—'}</div>`;

      html+=`<button class="act-btn" style="background:var(--org);color:#fff" onclick="resolveBreak('${v.id}','resume')">🔧 Resolved — Resume</button>`;
      html+=`<button class="act-btn" style="background:var(--blu);color:#fff" onclick="resolveBreak('${v.id}','release')">🔄 Release Route</button>`;

                ||(currentRole==='transport'&&v.status!=='inside'); // transport cannot mark dock

      const bc=next==='inside'?'var(--blu)':next==='dock'?'var(--pur)':next==='loaded'?'var(--grn)':'var(--acc)';

  if(currentRole==='transport') {
    if(r) html+=`<button class="btn-s" onclick="cMo();openRMo('${r.id}')">📍 Open Route →</button>`;
    else html+=`<button class="btn-s" onclick="cMo();openPoolAssign('${v.id}')">🔗 Assign to Route</button>`;
    // Remove from GNSC — revert to planned
    if(v.status==='inside'||v.status==='dock'||v.status==='loaded') {
      html+=`<div class="dvd"></div><button class="btn-d" onclick="removeFromGNSC('${v.id}')">🚫 Remove from GNSC</button>`;
    }
  }

  html+=`<button class="btn-s" onclick="cMo()">Close</button>`;

let vFilter='all';
function renderVehicles() {
  const el=document.getElementById('pg-vehicles'); if(!el||!el.classList.contains('on')) return;

  // Separate unplanned (gate-inwarded, no route, not in master)
  // Once a vehicle has a routeId it is ALWAYS part of plan, regardless of isUnplanned flag
  const unplanned  = vehicles.filter(v=>(v.isUnplanned||v.masterIncomplete)&&!v.routeId&&v.status!=='out');
  const notInMaster= vehicles.filter(v=>!masterLookup(v.number)&&!v.isUnplanned&&!v.masterIncomplete&&!v.routeId);
  const planned_v  = vehicles.filter(v=>v.routeId||(!v.isUnplanned&&!v.masterIncomplete));

  const filters=[
    {k:'all',    lb:'All'},
    {k:'planned',lb:'⏳ Planned'},
    {k:'inside', lb:'🕐 In GNSC'},
    {k:'dock',   lb:'🔋 At Dock'},
    {k:'loaded', lb:'📦 Loaded'},
    {k:'out',    lb:'✅ Departed'},
    {k:'breakdown',lb:'🚨 Breakdown'},
    {k:'pool',   lb:'🔄 Pool'},
  ];
  // Pool = in master with complete details, no route, not departed
  const pool = vehicles.filter(v=>!v.routeId&&v.status!=='out'&&!v.masterIncomplete&&masterLookup(v.number)&&!masterLookup(v.number).incomplete);
  const getList=()=>{
    if(vFilter==='pool')    return pool;
    if(vFilter==='all')     return planned_v;
    return planned_v.filter(v=>v.status===vFilter);
  };

  const list=getList();

  const fcHtml=filters.map(f=>{
    const cnt=f.k==='pool'?pool.length:f.k==='all'?planned_v.length:planned_v.filter(v=>v.status===f.k).length;
    return `<div class="fc${vFilter===f.k?' on':''}" onclick="vFilter='${f.k}';renderVehicles()">${f.lb}${cnt&&f.k!=='all'?` <span style="background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;padding:0 5px;font-size:9px;color:var(--mut)">${cnt}</span>`:''}</div>`;
  }).join('');

  // Unplanned chips section
  let unplannedHtml='';
  if(unplanned.length) {
    const chips=unplanned.map(v=>{
      const inMaster=!!masterLookup(v.number)&&!masterLookup(v.number).incomplete;
      return `<div style="background:var(--sur);border:1px solid ${inMaster?'var(--org)':'var(--red)'};border-radius:7px;padding:6px 9px;display:flex;align-items:center;justify-content:space-between;gap:8px">
        <div>
          <div style="display:flex;align-items:center;gap:5px">
            <span style="font-family:var(--mono);font-weight:800;font-size:12px;color:${inMaster?'var(--org)':'var(--red)'}">${esc(v.number)}</span>

          </div>
          <div style="font-size:9px;color:var(--mut);margin-top:1px">In ${v.times?.inside||'—'}</div>
        </div>
        <button onclick="${inMaster?`openPoolAssign('${v.id}')`:`openVMo('${v.id}')`}" style="background:${inMaster?'var(--org)':'var(--red)'};color:#fff;border:none;border-radius:5px;padding:4px 9px;font-size:10px;font-weight:800;cursor:pointer;white-space:nowrap">${inMaster?'Assign →':'Update →'}</button>

    }).join('');
    unplannedHtml=`<div style="background:var(--sur2);border:1px solid var(--red);border-radius:var(--r);padding:9px 11px;margin-bottom:10px">
      <div style="font-size:10px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.4px;margin-bottom:7px">🚨 ${unplanned.length} Unplanned Arrival${unplanned.length>1?'s':''}</div>

    </div>`;

    masterBanner=`<div style="background:var(--acd);border:1px solid var(--acc);border-radius:var(--r);padding:10px 13px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:12px;font-weight:700;color:var(--acc)">⚠️ ${notInMaster.length} vehicle${notInMaster.length>1?'s':''} not in fleet master</div>
      <button onclick="${notInMaster.map(v=>`masterUpsert('${v.number}','${esc(v.vendor)}','${esc(v.type)}')`).join(';')};saveMasters();toast('✅ Saved');renderVehicles();" style="background:var(--acc);color:#000;border:none;border-radius:7px;padding:7px 12px;font-size:12px;font-weight:800;cursor:pointer">Save All →</button>

    listHtml=`<div class="empty"><div class="empty-ic">🚛</div><div class="empty-t">No vehicles${vFilter!=='all'?' in this filter':' yet'}</div></div>`;
  } else {
    listHtml=`${list.length>8?searchBar('vSrch','Vehicle no, transporter, route...'):''}
    <div id="vSrch_list" style="background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden">`;
    list.forEach((v,i)=>{
      const r=vR(v), isLast=i===list.length-1;
      const notMaster=!masterLookup(v.number);
      const searchStr=(v.number+' '+(v.vendor||'')+' '+(v.type||'')+' '+(r?.city||'')+' '+(r?.routeNo||'')).toLowerCase();
      const poolBorder=!v.routeId&&!v.isUnplanned&&!v.masterIncomplete?'var(--blu)':(SC[v.status]||'var(--bdr)');

function renderDocks() {

  const tiles=DOCKS.map(d=>{ const dn=dockN(d), v=occ[dn], m=v?dockMins(v):0, over=m>=75;
    return `<div class="dtile" style="${v?`border-color:${over?'var(--org)':'var(--pur)'}`:''};${v?'cursor:pointer':''}" ${v?`onclick="openVMo('${v.id}')"`:''}><div class="dt-n" style="color:${v?(over?'var(--org)':'var(--pur)'):'var(--dim)'}">${esc(dn)}</div>${v?`<div class="dt-v">${esc(v.number.slice(-6))}</div><div class="dt-t" style="color:${over?'var(--org)':'var(--mut)'}">${fmtM(m)}${over?' ⚠️':''}</div>`:`<div class="dt-v" style="color:var(--grn)">Free</div>`}</div>`;
  }).join('');

  let html=`<div class="dg">${tiles}</div>`;
  if(!atD.length) {
    html+=`<div style="background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:14px;text-align:center;font-size:12px;color:var(--dim)">No vehicles loading</div>`;
  } else {
    html+=`<div class="sec" style="margin-bottom:8px">🔋 Active Loading <span class="sec-b">${atD.length}</span></div>`;
    atD.forEach(v=>{
      const m=dockMins(v), over=m>=75, pct=Math.min(100,Math.round(m/90*100));
      const r=vR(v);
      const freeDocks=DOCKS.map(dockN).filter(d=>d!==v.dock&&!occ[d]);
      html+=`<div style="background:var(--sur);border:1px solid ${over?'var(--org)':'var(--bdr)'};border-left:3px solid ${over?'var(--org)':'var(--pur)'};border-radius:var(--r);padding:12px 13px;margin-bottom:9px">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">
          <div><div style="font-family:var(--mono);font-weight:800;font-size:15px">${esc(v.number)}</div><div style="font-size:10px;color:var(--mut)">${esc(v.type)} · ${esc(v.vendor!=='—'?v.vendor:'—')}${r?' · '+esc(r.city):''}</div></div>
          <div style="text-align:right"><div style="font-family:var(--mono);font-size:20px;font-weight:800;color:${over?'var(--org)':'var(--pur)'}">${fmtM(m)}</div><div style="font-size:9px;color:${over?'var(--org)':'var(--mut)'};">${over?'⚠️ Over 1:30':'loading'}</div></div>
        </div>
        <div class="pb" style="margin-bottom:5px"><div class="pf" style="width:${pct}%;background:${over?'var(--org)':'var(--pur)'}"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--mut);margin-bottom:${freeDocks.length&&currentRole!=='leader'?'8px':'0'}">
          <span>Dock ${esc(v.dock||'—')} · Since ${v.times?.dock||'—'}</span><span>Limit: 1:30</span>
        </div>
        ${freeDocks.length&&currentRole!=='leader'?`<div style="border-top:1px solid var(--bdr);padding-top:8px"><div style="font-size:9px;font-weight:800;color:var(--mut);text-transform:uppercase;margin-bottom:5px">🔄 Reallocate</div><div style="display:flex;gap:5px;flex-wrap:wrap">${freeDocks.map(d=>`<button onclick="reallocDock('${v.id}','${d}')" style="padding:5px 10px;background:var(--sur2);border:1px solid var(--pur);border-radius:6px;color:var(--pur);font-family:var(--mono);font-size:11px;font-weight:800;cursor:pointer">${esc(d)}</button>`).join('')}</div></div>`:''}
      </div>`;
    });
    const loadedV=vehicles.filter(v=>v.status==='loaded');
    if(loadedV.length) {
      html+=`<div class="sec" style="margin-bottom:8px">📦 Loaded — Awaiting Gate Out <span class="sec-b">${loadedV.length}</span></div>`;
      loadedV.forEach(v=>{ const r=vR(v); html+=`<div style="background:var(--gnd);border:1px solid var(--grn);border-left:3px solid var(--grn);border-radius:var(--r);padding:10px 13px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between"><div><div style="font-family:var(--mono);font-weight:800;font-size:14px">${esc(v.number)}</div><div style="font-size:10px;color:var(--mut)">${r?esc(r.city):'—'} · Loaded ${v.times?.loaded||'—'}</div></div><div style="font-size:11px;color:var(--grn);font-weight:700">Awaiting Gate OUT</div></div>`; });
    }
  }
  el.innerHTML=`<div class="pg-h"><div><div class="pg-t">🔋 Live Docks</div></div></div>${html}<div style="height:16px"></div>`;
}
function reallocDock(vid, newDock) {
  const v=vehicles.find(x=>x.id===vid); if(!v) return;
  const old=v.dock; v.dock=newDock;
  log(v.number,'🔄 Dock: '+old+' → '+newDock,'var(--pur)');
  save(); toast(v.number+' → '+newDock); renderDocks();
}

  const secs={
    warehouse:[

      {t:'🔋 At Dock',sts:['dock'],next:'loaded',bc:'var(--grn)'},

    transport:[
      {t:'🚛 Gate IN',sts:['planned'],next:'inside',bc:'var(--blu)'},
      {t:'🔋 Place on Dock',sts:['inside'],next:'dock',bc:'var(--pur)'},

  const myDefs=secs[currentRole]||secs.leader;

  const occ=dockOccupied();

    html+=`<div class="al al-r" style="margin-bottom:10px">🚨 ${broke.length} vehicle${broke.length>1?'s':''} in breakdown</div>`;

  }

  myDefs.forEach(sec=>{
    const list=vehicles.filter(v=>sec.sts.includes(v.status)&&v.routeId).sort((a,b)=>t2m(vEta(a)||'23:59')-t2m(vEta(b)||'23:59'));

    list.forEach(v=>{
      const r=vR(v), eta=etaSt(v);

let _lastNotifTs = 0; // prevent showing same notification twice

function pushNotifToAll(role, title, body) {
  // Write notification to Firebase — all devices with that role will pick it up
  if(typeof db==='undefined') return;
  const notif = sanitize({role, title, body, ts: Date.now()});
  db.ref('gnsc/notifications').push(notif).catch(e=>console.warn('notif push:',e));
}

function startNotifListener() {
  if(typeof db==='undefined') return;
  db.ref('gnsc/notifications').on('value', snap=>{
    const all = snap.val();
    if(!all) return;
    // Find newest notification for this role that we haven't shown yet
    const entries = Object.values(all).filter(n=>
      n.ts > _lastNotifTs &&
      n.ts > Date.now() - 10000 && // only show if within last 10 seconds (fresh)
      (n.role === currentRole || n.role === 'all')
    );
    entries.forEach(n=>{
      sendPushNotification(n.title, n.body);
      _lastNotifTs = Math.max(_lastNotifTs, n.ts);
    });
  });
  // Clean up old notifications every hour
  setInterval(()=>{
    if(typeof db==='undefined') return;
    db.ref('gnsc/notifications').once('value', snap=>{
      const all=snap.val(); if(!all) return;
      const cutoff=Date.now()-(60*60*1000); // 1 hour
      Object.entries(all).forEach(([k,v])=>{ if(v.ts<cutoff) db.ref('gnsc/notifications/'+k).remove(); });
    });
  }, 60*60*1000);
}

function sendLeaderStatusPush() {
  if(currentRole!=='leader') return;
  const total=routes.filter(r=>!r.isCarryOver).length;
  const planned=vehicles.filter(v=>v.status==='planned'&&!v.isCarryOver).length;
  const inside=vehicles.filter(v=>v.status==='inside'&&!v.isCarryOver).length;
  const atDock=vehicles.filter(v=>v.status==='dock'&&!v.isCarryOver).length;
  const loaded=vehicles.filter(v=>v.status==='loaded'&&!v.isCarryOver).length;
  const departed=vehicles.filter(v=>v.status==='out'&&!v.isCarryOver).length;
  const broke=vehicles.filter(v=>v.status==='breakdown'&&!v.isCarryOver).length;
  const shortR=routes.filter(r=>!r.isCarryOver&&rSt(r)==='short').length;
  const now=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:false});

  // Check if all planned vehicles for today have departed
  const todayVehicles=vehicles.filter(v=>!v.isCarryOver);
  const allDeparted=total>0&&todayVehicles.length>0&&todayVehicles.every(v=>v.status==='out');

  if(allDeparted) {
    pushNotifToAll('leader', `✅ All Dispatched — ${now}`,
      `All ${departed} vehicles for today have departed. Dispatch complete!`);
    toast(`✅ All dispatched — final push sent`);
    stopLeaderStatusPush();
    return;
  }

  const parts=[];
  if(total)    parts.push(`${total} routes`);
  if(shortR)   parts.push(`⚠️ ${shortR} short`);
  if(planned)  parts.push(`⏳ ${planned} awaited`);
  if(inside)   parts.push(`🕐 ${inside} inside`);
  if(atDock)   parts.push(`🔋 ${atDock} at dock`);
  if(loaded)   parts.push(`📦 ${loaded} loaded`);
  if(departed) parts.push(`✅ ${departed} departed`);
  if(broke)    parts.push(`🚨 ${broke} breakdown`);

  pushNotifToAll('leader', `GNSC Status — ${now}`, parts.join(' · '));
  toast(`📊 Status push sent — ${now}`);
}

function startLeaderStatusPush() {
  if(_statusPushInterval) clearInterval(_statusPushInterval);

  function scheduleNext() {
    const now=new Date();
    const h=now.getHours(), m=now.getMinutes();
    const totalMins=h*60+m;

    // Push times: 11:00, 13:00, 15:00, 17:00, 19:00, 21:00, 23:00
    const pushTimes=[11,13,15,17,19,21,23].map(x=>x*60);
    const nextPush=pushTimes.find(t=>t>totalMins) || pushTimes[0]+1440; // next day 11am
    const msUntilNext=(nextPush-totalMins)*60*1000 - now.getSeconds()*1000;

    _statusPushInterval=setTimeout(()=>{
      sendLeaderStatusPush();
      if(_statusPushInterval) scheduleNext(); // schedule next unless stopped
    }, msUntilNext);

    // If current time is exactly a push time, send now
    if(pushTimes.includes(totalMins)) sendLeaderStatusPush();
  }

  scheduleNext();
}
function stopLeaderStatusPush() {
  if(_statusPushInterval){ clearInterval(_statusPushInterval); _statusPushInterval=null; }
}

let _alertRepeatInterval=null;
let _wakeLock=null;
let _audioCtx=null;

function getAudioCtx() {
  if(!_audioCtx) _audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  if(_audioCtx.state==='suspended') _audioCtx.resume().catch(()=>{});
  return _audioCtx;
}

// Resume audio on first user tap — required by iOS/Android
document.addEventListener('click',()=>{ try{ getAudioCtx(); }catch(e){} },{passive:true});
document.addEventListener('touchstart',()=>{ try{ getAudioCtx(); }catch(e){} },{passive:true});

function playAlertSound() {
  try {
    const ctx=getAudioCtx();
    if(!ctx) return;
    stopAlertSound();

    const osc=ctx.createOscillator();
    const gainNode=ctx.createGain();
    osc.connect(gainNode);
    gainNode.connect(ctx.destination);
    osc.type='square';
    osc.frequency.value=880;

    // Schedule beep pattern: 0.3s ON, 0.2s OFF, repeat
    const now=ctx.currentTime;
    gainNode.gain.setValueAtTime(0, now);
    for(let i=0;i<200;i++){  // 200 cycles = ~100 seconds
      const t=now+(i*0.5);
      gainNode.gain.setValueAtTime(0.6, t);
      gainNode.gain.setValueAtTime(0, t+0.3);
    }
    osc.start(now);
    // Don't call osc.stop() — let stopAlertSound() handle it

    window._alertOsc=osc;
    window._alertGain=gainNode;
    window._alertCtxRef=ctx;
  } catch(e){ console.warn('Audio error:',e); }
}

function stopAlertSound() {
  try {
    if(window._alertReschedule) { clearInterval(window._alertReschedule); window._alertReschedule=null; }
    if(window._alertOsc) {
      try { window._alertOsc.stop(0); } catch(e){}
      try { window._alertOsc.disconnect(); } catch(e){}
      window._alertOsc=null;
    }
    if(window._alertGain) {
      try { window._alertGain.disconnect(); } catch(e){}
      window._alertGain=null;
    }
  } catch(e){}
}

async function requestWakeLock() {
  try {
    if('wakeLock' in navigator) {
      _wakeLock=await navigator.wakeLock.request('screen');
    }
  } catch(e){}
}
function releaseWakeLock() {
  if(_wakeLock) { _wakeLock.release().catch(()=>{}); _wakeLock=null; }
}

function startAlertRepeat(alerts) {
  stopAlertRepeat();
  if(!alerts.length) return;
  playAlertSound(); // start continuous beep immediately
  if(navigator.vibrate) navigator.vibrate([300,100,300,100,600]);
  // Wake lock — keep screen on
  requestWakeLock();
  // Flash page title
  let titleFlip=false;
  const origTitle=document.title;
  const titleInterval=setInterval(()=>{
    document.title=titleFlip?origTitle:'🚨 ALERT — GNSC';
    titleFlip=!titleFlip;
  },800);
  // Flash banner background
  const banner=document.getElementById('gateBanner');
  if(banner) {
    banner.style.animation='none';
    banner.style.transition='background 0.3s';
    let flashCount=0;
    const flashInt=setInterval(()=>{
      if(flashCount>6||!document.getElementById('gateBanner')){ clearInterval(flashInt); return; }
      banner.style.background=flashCount%2===0?'#FF0000':'var(--acc)';
      flashCount++;
    },300);
  }
  // Reschedule vibration every 10 seconds while alert is pending
  _alertRepeatInterval=setInterval(()=>{
    const pending=getGateAlerts().filter(a=>!a.ack);
    if(!pending.length) { stopAlertRepeat(); clearInterval(titleInterval); document.title=origTitle; return; }
    if(navigator.vibrate) navigator.vibrate([200,100,200]);
  },10000);
  // Store titleInterval for cleanup
  window._titleInterval=titleInterval;
  window._origTitle=origTitle;
}

function stopAlertRepeat() {
  if(_alertRepeatInterval) { clearInterval(_alertRepeatInterval); _alertRepeatInterval=null; }
  if(window._titleInterval) { clearInterval(window._titleInterval); window._titleInterval=null; }
  if(window._origTitle) { document.title=window._origTitle; window._origTitle=null; }
  releaseWakeLock();
}

function playAlertSoundOnce() { playAlertSound(); }

      ${out.map((v,i)=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:${i===out.length-1?'none':'1px solid var(--bdr2)'};opacity:.6"><span style="font-family:var(--mono);font-weight:700;font-size:13px">${esc(v.number)}</span><span style="font-size:11px;color:var(--mut)">Out ${v.times?.out||'—'}</span></div>`).join('')}

}
function gSearch(val) {
  const res=document.getElementById('gRes'); if(!res) return;
  const q=val.trim().toUpperCase().replace(/\s+/g,'');
  if(q.length<3){ res.innerHTML=''; return; }

  // Case 1: Already in today's plan
  const v=vehicles.find(x=>x.number.replace(/\s+/g,'').toUpperCase()===q||x.number.replace(/\s+/g,'').toUpperCase().endsWith(q));
  if(v) {
    const r=vR(v);
    if(v.status==='planned') {
      res.innerHTML=`<div style="background:var(--bld);border:1px solid var(--blu);border-radius:var(--r);padding:13px">
        <div style="font-family:var(--mono);font-weight:800;font-size:17px;color:var(--blu);margin-bottom:3px">${esc(v.number)}</div>
        <div style="font-size:11px;color:var(--mut);margin-bottom:4px">${esc(v.vendor!=='—'?v.vendor:'—')}${r?' · '+esc(r.city)+' '+esc(r.routeNo):''}</div>
        <div style="font-size:11px;color:var(--acc);margin-bottom:11px">✅ In today's plan · Planned</div>
        <button class="act-btn" style="background:var(--blu);color:#fff;margin-bottom:0" onclick="updateStatus('${v.id}','inside');gClear()">🚛 Mark AT GNSC</button>
      </div>`;
    } else if(v.status==='loaded') {
      res.innerHTML=`<div style="background:var(--gnd);border:1px solid var(--grn);border-radius:var(--r);padding:13px">
        <div style="font-family:var(--mono);font-weight:800;font-size:17px;color:var(--grn);margin-bottom:4px">${esc(v.number)}</div>
        <div style="font-size:11px;color:var(--mut);margin-bottom:11px">📦 Loaded · Ready to depart</div>
        <button class="act-btn" style="background:var(--acc);color:#000;margin-bottom:0" onclick="confirmOut('${v.id}');gClear()">✅ Gate OUT</button>
      </div>`;
    } else if(v.status==='inside'||v.status==='dock') {
      res.innerHTML=`<div style="background:var(--bld);border:1px solid var(--blu);border-radius:var(--r);padding:13px">
        <div style="font-family:var(--mono);font-weight:800;font-size:16px;color:var(--blu)">${esc(v.number)}</div>
        <div style="font-size:12px;color:var(--mut);margin-top:3px">🏭 Already inside GNSC — ${SL[v.status]}</div>
        <div style="font-size:11px;color:var(--red);margin-top:5px;font-weight:700">⚠️ Do not inward again</div>
      </div>`;
    } else {
      res.innerHTML=`<div style="background:var(--sur);border:1px solid var(--bdr);border-radius:var(--r);padding:13px">
        <div style="font-family:var(--mono);font-weight:800;font-size:16px">${esc(v.number)}</div>
        <div style="font-size:12px;color:var(--mut);margin-top:3px">${SI[v.status]} ${SL[v.status]} — no action needed at gate</div>
      </div>`;
    }
    return;
  }

  // Case 2: In master, NOT in today's plan → inward as pool vehicle, alert transport
  const m=masterLookup(q);
  if(m) {
    res.innerHTML=`<div style="background:var(--acd);border:1px solid var(--acc);border-radius:var(--r);padding:13px">
      <div style="font-family:var(--mono);font-weight:800;font-size:17px;color:var(--acc);margin-bottom:2px">${esc(m.number)}</div>
      <div style="font-size:11px;color:var(--mut);margin-bottom:3px">${esc(m.vendor!=='—'?m.vendor:'—')} · ${esc(m.type)}</div>
      <div style="font-size:11px;font-weight:700;color:var(--org);margin-bottom:11px">⚠️ Not in today's plan — will be inwarded as pool · transport alerted</div>
      <button class="act-btn" style="background:var(--acc);color:#000;margin-bottom:0" onclick="gAddKnown('${m.number}','${esc(m.vendor)}','${esc(m.type)}')">🚛 Inward & Alert Transport</button>
    </div>`;
    return;
  }

  // Case 3: Not in master → confirm vehicle number, inward only, transport must update master
  const validFmt=validVNum(q);
  res.innerHTML=`<div style="background:var(--sur);border:1px solid var(--red);border-radius:var(--r);padding:13px">
    <div style="font-family:var(--mono);font-weight:800;font-size:17px;color:var(--red);margin-bottom:4px">${esc(q)}</div>
    ${!validFmt?`<div class="al al-r" style="margin-bottom:10px;font-size:11px">🚨 Invalid vehicle number format — must be like MH04AB1234 or MH04A1234. Please re-enter.</div><button class="act-btn" style="background:var(--sur2);color:var(--mut);border:1px solid var(--bdr);margin-bottom:0" onclick="gClear()">✕ Re-enter Number</button>`
    :`<div class="al al-r" style="margin-bottom:10px;font-size:11px">🚨 Not in fleet master — transport team must update master with full details</div>
    <div style="font-size:12px;color:var(--mut);margin-bottom:10px">Confirm the vehicle number is correct before inwarding.</div>
    <div style="background:var(--sur2);border-radius:8px;padding:10px;margin-bottom:10px;font-family:var(--mono);font-size:18px;font-weight:800;text-align:center;letter-spacing:2px;color:var(--txt)">${esc(q)}</div>
    <button class="act-btn" style="background:var(--red);color:#fff;margin-bottom:7px" onclick="gAddUnknown('${q}')">⚠️ Confirm & Inward — Alert Transport</button>
    <button class="act-btn" style="background:var(--sur2);color:var(--mut);border:1px solid var(--bdr);margin-bottom:0" onclick="gClear()">✕ Cancel</button>`}
  </div>`;
}
function gClear() { const i=document.getElementById('gSrch');if(i)i.value=''; const r=document.getElementById('gRes');if(r)r.innerHTML=''; }
function gAddKnown(num, vendor, type) {
  // Known vehicle (in master), not in today's plan — inward as pool, alert transport
  if(vehicles.find(v=>v.number===num&&v.status!=='out')){ toast('Already inwarded'); return; }
  const v={id:genId(),number:num,type:type||'24ft',vendor:vendor||'—',dock:'—',routeId:null,status:'inside',times:{planned:nowTime(),inside:nowTime()},date:TODAY,isUnplanned:true,createdAt:Date.now()};
  vehicles.push(v);
  log(num,'🚛 Inwarded (not in plan) · transport alerted','var(--org)');
  save(); toast('⚠️ '+num+' inwarded · transport alerted'); gClear(); renderAll();
}
function gAddUnknown(num) {
  // Not in master — inward with incomplete details, transport must complete master
  if(vehicles.find(v=>v.number===num&&v.status!=='out')){ toast('Already inwarded'); return; }
  const v={id:genId(),number:num,type:'—',vendor:'—',dock:'—',routeId:null,status:'inside',times:{planned:nowTime(),inside:nowTime()},date:TODAY,isUnplanned:true,masterIncomplete:true,createdAt:Date.now()};
  vehicles.push(v);
  // Add skeleton to master so transport can fill in details
  if(!masterLookup(num)) masterVehicles.push({number:num,vendor:'—',type:'—',incomplete:true});
  localStorage.setItem('gnsc_master',JSON.stringify(masterVehicles));
  log(num,'⚠️ NOT IN MASTER — inwarded · transport must update master','var(--red)');
  save(); toast('⚠️ '+num+' inwarded · UPDATE MASTER'); gClear(); renderAll();
}

function setAddArr(s) {

function checkRVehEta(num) {
  const etaF=document.getElementById('rEtaF');
  const info=document.getElementById('rVehInfo');
  if(!num){ if(etaF) etaF.style.display='block'; if(info) info.textContent=''; return; }

    if(etaF) etaF.style.display='none';

function vLookup(num) {

  const ban=document.getElementById('vBan'); if(!ban) return;
  if(m) {
    const te=document.getElementById('fType'), ve=document.getElementById('fVnd');

    ban.textContent='⚠️ New vehicle — will be added to fleet registry';
  } else { ban.style.display='none'; }
}
function addVehicle() {
  const num=(document.getElementById('fNum')?.value||'').trim().toUpperCase();
  const vnd=(document.getElementById('fVnd')?.value||'').trim();
  const type=document.getElementById('fType')?.value||'24ft';
  const rid=document.getElementById('fRoute')?.value||'';
  const eta=addArrival==='planned'?(document.getElementById('fEta')?.value||''):'';

  if(!num){ toast('⚠️ Enter vehicle number','err'); return; }
  if(!vnd||vnd==='—'){ toast('⚠️ Enter transporter name','err'); return; }
  if(!type||type==='—'){ toast('⚠️ Select vehicle type','err'); return; }
  if(vehicles.find(v=>v.number===num&&v.status!=='out')){ toast('⚠️ Already in today\'s plan','err'); return; }

  // Always update master with complete details
  masterUpsert(num, vnd, type);
  saveMasters();

  // If route selected → assign. If no route → goes to pool (no route required)
  // But if "Add to Plan" intent is clear (arrival set), route is strongly recommended
  if(!rid && addArrival==='planned') {
    // Going to pool — confirm
    const goPool = true; // allow pool with complete master
    if(!goPool){ toast('⚠️ Select a route or set arrival to "Already at GNSC"','err'); return; }
  }

  const existing=masterLookup(num);
  const finalVnd=existing?.vendor!=='—'?existing.vendor:vnd;
  const finalType=existing?.type!=='—'?existing.type:type;

  const v={id:genId(),number:num,type:finalType,vendor:finalVnd,dock:'—',routeId:null,status:addArrival,times:{planned:nowTime()},date:TODAY,eta,createdAt:Date.now()};
  if(addArrival==='inside') v.times.inside=nowTime();
  vehicles.push(v);

  if(rid){
    const r=routes.find(x=>x.id===rid);
    if(r&&!r.vehicleId) link(v.id,r.id);
  }

  const co=vehicles.find(x=>x.number===num&&x.isCarryOver&&x.id!==v.id&&x.status!=='out');
  if(co) toast('⚠️ '+num+' is carry-over from '+co.carryOverDate,'err');

  log(num,'➕ Added'+(v.routeId?' → '+vR(v)?.routeNo:' (pool)')+' · master updated','var(--blu)');
  save(); renderCOBan(); renderAll();
  toast('✅ '+num+(rid?' → route':'→ pool')+' · master updated');

  ['fNum','fVnd'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const ban=document.getElementById('vBan'); if(ban) ban.style.display='none';
  setAddArr('planned');
  refreshDL();
}
function addRoute() {
  const rNo =(document.getElementById('rNo')?.value||'').trim().toUpperCase();
  if(!rNo){  toast('⚠️ Enter route number','err'); return; }
  if(routes.find(r=>r.routeNo===rNo&&!r.isCarryOver)){ toast('⚠️ Route '+rNo+' already exists today — use a unique route number','err'); return; }

  const storeList=[...document.querySelectorAll('#rStores input')].map(i=>i.value.trim()).filter(Boolean);
  if(!storeList.length){ toast('⚠️ Add at least one store','err'); return; }

  // Validate stores against master — block if any not in master
  const notInMasterStores=storeList.filter(s=>!masterStores.find(ms=>ms.name.toLowerCase()===s.toLowerCase()));
  if(notInMasterStores.length){
    toast('⚠️ Store(s) not in master: '+notInMasterStores.join(', ')+' — add to Store Master first','err');
    return;
  }

  // Auto-fill city and destType from first store in master
  const firstStore=masterStores.find(ms=>ms.name.toLowerCase()===storeList[0].toLowerCase());
  const city=firstStore?.city||'—';
  const destType=firstStore?.destType?.toLowerCase().includes('out')?'outstation':'local';

  // Warn if same stores already planned today
  const dupStores=storeList.filter(s=>routes.some(r=>!r.isCarryOver&&r.stores?.some(rs=>rs.toLowerCase()===s.toLowerCase())));
  if(dupStores.length){ if(!confirm('⚠️ These stores are already in today\'s plan:\n'+dupStores.join(', ')+'\n\nContinue?')) return; }

  const etaField=document.getElementById('rEtaF');
  const vInside=vNum?vehicles.find(v=>v.number===vNum&&['inside','dock','loaded'].includes(v.status)&&!v.isCarryOver):null;
  const eta=vInside?'':(document.getElementById('rEta')?.value||'17:00'); // default 17:00
  const notes=(document.getElementById('rNotes')?.value||'').trim();
  const vNum =(document.getElementById('rVeh')?.value||'').trim().toUpperCase();

  // Validate vehicle if provided
  if(vNum) {
    const m=masterLookup(vNum);
    if(!m||m.incomplete||m.vendor==='—'||m.type==='—'){
      toast('⚠️ Vehicle '+vNum+' not in fleet master — add to masters first','err'); return;
    }
  }

  const r={id:genRId(),routeNo:rNo,city,stores:storeList,destType,eta,notes,vehicleId:null,status:'short',date:TODAY,createdAt:Date.now()};
  routes.push(r);
  if(vNum) {
    let v=vehicles.find(x=>x.number===vNum&&x.status!=='out');
    if(!v){ const m=masterLookup(vNum); v={id:genId(),number:vNum,type:m?.type||'24ft',vendor:m?.vendor||'—',dock:'—',routeId:null,status:'planned',times:{planned:nowTime()},date:TODAY,eta,createdAt:Date.now()}; vehicles.push(v); }
    link(v.id,r.id);
    log(rNo,'📍 Route added · '+vNum+' assigned','var(--acc)');
  } else { log(rNo,'📍 Route added (short) · '+city,'var(--org)'); }
  save(); renderAll(); toast('📍 Route '+rNo+' added · '+city+(destType==='outstation'?' OS':' L'));
  ['rNo','rNotes','rVeh'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('rEta').value='07:00';
  setRDT('local');
  document.getElementById('rStores').innerHTML='';
  addRStore();
  switchTab('routes');
}

function requestPrechill(vid, vnum) {
  const v=vehicles.find(x=>x.id===vid); if(!v) return;
  if(!confirm(`Request prechill for ${vnum}?\nAlert will be sent to Gate and Pilot team.`)) return;
  v.prechill=true;
  v.prechillConfirmed=false;
  // Add prechill alert
  const alerts=getGateAlerts();
  alerts.unshift({id:Date.now().toString(36),vid,vnum,dock:'—',time:nowTime(),ts:Date.now(),ack:false,sentBy:'Warehouse',type:'prechill',msg:'Prechill vehicle before dock'});
  saveGateAlerts(alerts.slice(0,50));
  // Push to Gate + Pilot
  pushNotifToAll('pilot','❄️ Prechill Request — GNSC',`Prechill ${vnum} before dock placement`);
  save(); renderAll();
  toast('❄️ Prechill requested — Gate & Pilot alerted');
}

function ackGateAlert(alertId) {
  const confirmedBy=currentRole==='pilot'?'Pilot':'Gate';
  const alerts=getGateAlerts().map(a=>{
    if(a.id===alertId||a.vid===alertId) {
      if(a.type==='prechill') {
        const v=vehicles.find(x=>x.id===a.vid);
        if(v) { v.prechillConfirmed=true; save(); }
      }
      // Push confirmation to warehouse
      const actionLabel=a.type==='prechill'?'Prechill done':a.type==='loaded'?'Dock cleared':'Placed on dock';
      pushNotifToAll('warehouse',`✅ ${confirmedBy} confirmed — ${a.vnum}`,`${actionLabel}${a.dock&&a.dock!=='—'?' · Dock '+a.dock:''} · ${nowTime()}`);
      return {...a,ack:true,ackTime:nowTime(),confirmedBy};
    }
    return a;
  });
  saveGateAlerts(alerts);
  // Stop repeating alert if no more pending
  const stillPending=alerts.filter(a=>!a.ack);
  if(!stillPending.length) { stopAlertRepeat(); stopAlertSound(); }
  const banner=document.getElementById('gateBanner');
  if(banner) { renderAll(); }
}

function parseBulk(text) {
  const map={};
  text.trim().split('\n').filter(l=>l.trim()).forEach(line=>{
    const c = line.includes('\t')
      ? line.split('\t').map(x=>x.trim().replace(/^"|"$/g,''))
      : line.split(/\s{2,}/).map(x=>x.trim().replace(/^"|"$/g,''));
    const [rNo, store, vNum]=c;
    if(!rNo||rNo==='Route No'||rNo==='route no') return;
    const key=rNo.trim().toUpperCase();
    if(!map[key]) map[key]={routeNo:key,destType:'local',city:'—',stores:[],vehicleNo:'',eta:'17:00',vendor:'—',type:'24ft',storeIssues:[]};
    const r=map[key];
    // Look up store in master
    const storeName=(store||'').trim();
    if(storeName) {
      const sm=masterStores.find(s=>s.name.toLowerCase()===storeName.toLowerCase());
      if(sm) {
        r.stores.push(sm.name);
        if(r.city==='—') r.city=sm.city||'—';
        if(sm.destType) r.destType=sm.destType.toLowerCase().includes('out')?'outstation':'local';
      } else {
        r.stores.push(storeName);
        r.storeIssues.push(storeName+' not in store master');
      }
    }
    // Vehicle
    const vn=(vNum||'').trim().toUpperCase().replace(/\s+/g,'');
    if(!r.vehicleNo&&vn) r.vehicleNo=vn;
    // Auto-fill from vehicle master
    if(r.vehicleNo) {
      const m=masterLookup(r.vehicleNo);
      if(m) { if(m.vendor&&m.vendor!=='—') r.vendor=m.vendor; if(m.type&&m.type!=='—') r.type=m.type; }
    }
  });
  return Object.values(map);
}

function activateTomorrowNow() {
  if(!tomorrowPlan.length){ toast('⚠️ No plan queued','err'); return; }
  if(!confirm('Activate tomorrow\'s plan now?\n\nRoutes will be stamped with tomorrow\'s date. Midnight will not reset anything.\n\nProceed?')) return;

  // Use tomorrow's IST date so midnight guard recognises this as "today's" data
  const _istNow=new Date(Date.now()+(5.5*60*60*1000));
  const _istTmrw=new Date(_istNow.getTime()+(24*60*60*1000));
  const nextDate=_istTmrw.toISOString().slice(0,10);

  const existingVNums=new Set(vehicles.filter(v=>['inside','dock','loaded'].includes(v.status)).map(v=>v.number));
  let ra=0, va=0, skipped=[];

  tomorrowPlan.forEach(p=>{
    if(routes.find(r=>r.routeNo===p.routeNo&&!r.isCarryOver)){ return; }
    const rId=genRId();
    const route={id:rId,routeNo:p.routeNo,city:p.city,stores:p.stores,destType:p.destType,eta:p.eta,notes:'',vehicleId:null,status:'short',date:nextDate};
    routes.push(route); ra++;
    if(p.vehicleNo) {
      const m=masterLookup(p.vehicleNo);
      if(!m||m.incomplete||m.vendor==='—') { skipped.push(p.vehicleNo); return; }
      const poolV=vehicles.find(v=>v.number===p.vehicleNo&&['inside','dock','loaded'].includes(v.status)&&!v.routeId);
      if(poolV) {
        poolV.routeId=rId; route.vehicleId=poolV.id; route.status=poolV.status; va++;
      } else if(!existingVNums.has(p.vehicleNo)) {
        const vId=genId();
        const veh={id:vId,number:p.vehicleNo,type:m?.type||'24ft',vendor:m?.vendor||'—',dock:'—',routeId:rId,status:'planned',times:{planned:nowTime()},date:nextDate,eta:p.eta||'17:00',createdAt:Date.now()};
        vehicles.push(veh); route.vehicleId=vId; route.status='planned'; va++;
      } else {
        skipped.push(p.vehicleNo);
      }
    }
  });

  // Mark old-date vehicles/routes as carry-over immediately
  // so YDAY flags show right away without waiting for midnight
  markCarryOvers(nextDate);

  // Clear actual indent for new day
  actualIndent=0;
  localStorage.setItem('gnsc_actual_indent','0');
  localStorage.setItem('gnsc_indent_date',nextDate);

  // Push nextDate to Firebase lastday so all devices know day is handled
  if(typeof db!=='undefined') db.ref('gnsc/daily/lastday').set(nextDate).catch(e=>console.warn(e));
  localStorage.setItem('gnsc_lastday', nextDate);

  // Clear tomorrow queue
  tomorrowPlan=[];
  localStorage.setItem('gnsc_tomorrow',JSON.stringify(tomorrowPlan));
  saveMasters(); save(nextDate); syncDaily(); // stamp nextDate as dayKey so midnight guard works
  log('TRANSPORT',`⚡ Tomorrow's plan activated early — ${ra} routes, ${va} vehicles`,'var(--acc)');
  toast(`⚡ Plan activated — ${ra} routes · ${va} vehicles · midnight will not reset`);
  if(skipped.length) setTimeout(()=>alert('⚠️ '+skipped.length+' vehicles skipped (not in master or busy):\n'+skipped.join(', ')),300);
  renderAll();
}

function bulkUpload(append=false) {
  const parsed=window._bulkParsed||[];
  if(!parsed.length){ toast('⚠️ Preview first','err'); return; }

  // Check all ETAs are filled for vehicles not yet inside GNSC
  const needEta=(window._bulkNeedEta||[]).filter(p=>{
    // Skip if vehicle is now inside GNSC (may have arrived after preview)
    const v=vehicles.find(x=>x.number===p.vehicleNo&&['inside','dock','loaded'].includes(x.status));
    return !v; // only need ETA if still not inside
  });
  const missingEta=needEta.filter(p=>{ const el=document.getElementById('eta_'+p.vehicleNo); return !el||!el.value; });
  if(missingEta.length) {
    // Set default 17:00 for any missing ETAs instead of blocking
    missingEta.forEach(p=>{ const el=document.getElementById('eta_'+p.vehicleNo); if(el) el.value='17:00'; });
    if(missingEta.length) toast('⚠️ ETA defaulted to 17:00 for '+missingEta.length+' vehicle(s) — update from Vehicles tab');
  }
  let ra=0, va=0, sk=0, conflicts=[];

  if(!append) {
    // Replace mode — clear today's routes and unassigned vehicles first
    const todayVids=new Set(routes.filter(r=>!r.isCarryOver).map(r=>r.vehicleId).filter(Boolean));
    routes=routes.filter(r=>r.isCarryOver);
    vehicles=vehicles.filter(v=>v.isCarryOver||v.isUnplanned||!todayVids.has(v.id));
    toast('🔄 Replacing today\'s plan...');
  } else {
    toast('➕ Appending to today\'s plan...');
  }

  parsed.forEach(p=>{
    if(routes.find(r=>r.routeNo===p.routeNo&&!r.isCarryOver)){ sk++; return; }
    // Block route if any store not in master
    if(p.storeIssues&&p.storeIssues.length) {
      conflicts.push({rNo:p.routeNo,vNo:'',reason:'stores not in master: '+p.storeIssues.join(', ')});
      sk++; return;
    }
    if(p.vehicleNo){ const co=vehicles.find(v=>v.number===p.vehicleNo&&v.isCarryOver&&v.status!=='out'); if(co) conflicts.push({rNo:p.routeNo,vNo:p.vehicleNo,date:co.carryOverDate}); }

    // Create route
    const rId=genRId();
    const route={id:rId,routeNo:p.routeNo,city:p.city,stores:p.stores,destType:p.destType,eta:p.eta,notes:'',vehicleId:null,status:'short',date:TODAY,createdAt:Date.now()};
    routes.push(route);
    ra++;

    // Read ETA from input if shown
    if(p.vehicleNo) {
      const etaEl=document.getElementById('eta_'+p.vehicleNo);
      if(etaEl) p.eta=etaEl.value||p.eta;
    }
    if(p.vehicleNo) {
      // Block if vehicle not in master or master incomplete
      const m=masterLookup(p.vehicleNo);
      if(!m||m.incomplete||m.vendor==='—'||m.type==='—') {
        // Upload route as Short — skip vehicle
        conflicts.push({rNo:p.routeNo,vNo:p.vehicleNo,reason:'not in fleet master — route uploaded as Short'});
        return; // route already pushed above, just no vehicle
      }
      // Check if vehicle already active
      const existingActive=vehicles.find(x=>x.number===p.vehicleNo&&x.status!=='out'&&!x.isCarryOver);
      if(existingActive) {
        if(existingActive.routeId) {
          // Already assigned to another route — skip
          conflicts.push({rNo:p.routeNo,vNo:p.vehicleNo,reason:'already assigned to another route'});
          sk++; ra--; routes.pop(); return;
        } else {
          // Vehicle is in GNSC (gate in) but not assigned — link to this route
          existingActive.routeId=rId;
          existingActive.eta=p.eta||existingActive.eta;
          existingActive.isUnplanned=false;       // now part of plan
          existingActive.masterIncomplete=false;  // master assumed complete if in bulk plan
          // Fill in master details if missing
          const m=masterLookup(existingActive.number);
          if(m&&existingActive.vendor==='—') existingActive.vendor=m.vendor;
          if(m&&existingActive.type==='—') existingActive.type=m.type;
          route.vehicleId=existingActive.id;
          route.status=existingActive.status;
        }
      } else {
        // Create new vehicle entry
        if(!validVNum(p.vehicleNo)){ conflicts.push({rNo:p.routeNo,vNo:p.vehicleNo,reason:'invalid vehicle number format'}); }
        const vId=genId();
        const m=masterLookup(p.vehicleNo);
        const veh={id:vId,number:p.vehicleNo,type:p.type||(m?.type||'24ft'),vendor:p.vendor!=='—'?p.vendor:(m?.vendor||'—'),dock:'—',routeId:rId,status:'planned',times:{planned:nowTime()},date:TODAY,eta:p.eta,createdAt:Date.now()};
        vehicles.push(veh);
        masterUpsert(veh.number,veh.vendor,veh.type);
        va++;
        route.vehicleId=vId;
        route.status='planned';
      }
    }
  });

  log('BULK','📋 Plan: '+ra+' routes · '+va+' vehicles'+(sk?' · '+sk+' skipped':''),'var(--acc)');
  save(); refreshDL();
  document.getElementById('bInput').value='';
  document.getElementById('bPreview').style.display='none';
  document.getElementById('bConfirm').style.display='none';
  if(conflicts.length) {
    const masterConflicts=conflicts.filter(c=>c.reason&&c.reason.includes('master'));
    const otherConflicts=conflicts.filter(c=>!c.reason||!c.reason.includes('master'));
    if(masterConflicts.length) setTimeout(()=>alert('⚠️ '+masterConflicts.length+' route(s) uploaded as Short (vehicle not in master):\n\n'+masterConflicts.map(c=>c.rNo+' — '+c.vNo).join('\n')+'\n\nAdd these vehicles to Fleet Master and re-upload to assign them.'),300);
    if(otherConflicts.length) setTimeout(()=>alert('⚠️ Conflicts:\n\n'+otherConflicts.map(c=>c.vNo+' ('+c.rNo+'): '+c.reason).join('\n')),masterConflicts.length?800:300);
  }
  const storeConflicts=conflicts.filter(c=>c.reason&&c.reason.includes('stores not in master'));
  if(storeConflicts.length) setTimeout(()=>alert('🚨 '+storeConflicts.length+' route(s) NOT created (stores not in master):\n\n'+storeConflicts.map(c=>c.rNo+' — '+c.reason).join('\n')+'\n\nAdd these stores to Store Master and re-upload.'),600);
  toast('✅ '+ra+' routes uploaded · '+va+' vehicles assigned'+(conflicts.filter(c=>c.reason?.includes('master')).length?' · '+conflicts.filter(c=>c.reason?.includes('master')).length+' Short (no master)':''));
  saveMasters(); save(); // push to Firebase
  renderAll(); switchTab('plan');
}

      ?[{k:'dock',ic:'🔋',c:'var(--pur)'},{k:'loaded',ic:'📦',c:'var(--grn)'},{k:'out',ic:'✅',c:'var(--acc)'}]
      :[{k:'inside',ic:'🚛',c:'var(--blu)'},{k:'dock',ic:'🔋',c:'var(--pur)'},{k:'loaded',ic:'📦',c:'var(--grn)'},{k:'out',ic:'✅',c:'var(--acc)'}];

    const tl=stages.map((s,i)=>{
      const done=curIdx>=stageOrder.indexOf(s.k)&&v?.status!=='breakdown';
      const cur=v?.status===s.k;
      const t=times[s.k]||'';
      return `<div style="display:flex;align-items:center;gap:3px;flex:1;min-width:0">
        <div style="width:20px;height:20px;border-radius:50%;background:${done?s.c:'var(--sur2)'};border:1.5px solid ${done?s.c:'var(--bdr)'};display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;${cur?'animation:pulse 1.5s infinite':''}">${done?s.ic:''}</div>
        <div style="min-width:0"><div style="font-family:var(--mono);font-size:9px;font-weight:${done?'700':'400'};color:${done?'var(--txt)':'var(--dim)'};white-space:nowrap">${t||'—'}</div></div>
        ${i<stages.length-1?`<div style="flex:1;height:1.5px;background:${done&&curIdx>stageOrder.indexOf(s.k)?s.c:'var(--bdr2)'};margin:0 2px"></div>`:''}

        <div style="display:flex;align-items:center;gap:5px;min-width:0">
          <span style="font-family:var(--mono);font-weight:800;font-size:12px;flex-shrink:0">${esc(r.routeNo)}</span>

          ${r.destType==='outstation'?`<span style="font-size:8px;background:var(--bld);color:var(--blu);border-radius:3px;padding:1px 4px;font-weight:800;flex-shrink:0">OS</span>`:`<span style="font-size:8px;background:var(--acd);color:var(--acc);border-radius:3px;padding:1px 4px;font-weight:800;flex-shrink:0">L</span>`}

        </div>
        <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
          ${v?`<span style="font-family:var(--mono);font-size:10px;font-weight:800;color:var(--txt)">${esc(v.number)}</span>${v.dock&&v.dock!=='—'?`<span style="font-size:9px;color:var(--pur);font-weight:700">${esc(v.dock)}</span>`:''}`:
          `<span style="font-size:10px;color:var(--org);font-weight:700">⚠️ Short</span>`}
          <span style="font-size:9px;padding:1px 5px;border-radius:4px;font-weight:800;background:${SBG[rs]};color:${SC[rs]}">${SI[rs]}</span>
        </div>
      </div>
      ${v&&v.status!=='planned'?`<div style="display:flex;align-items:center">${tl}</div>`
       :`<div style="font-size:9px;color:var(--dim)">⏳ ETA ${esc(r.eta||v?.eta||'—')}</div>`}
    </div>`;
  }

  const outR=all.filter(r=>rSt(r)==='out');
  const activeR=all.filter(r=>rSt(r)!=='out');
  const pct=all.length?Math.round(outR.length/all.length*100):0;

  el.innerHTML=`<div class="pg-h"><div><div class="pg-t">📋 Today's Details</div><div class="pg-s">${all.length} routes · ${outR.length} departed · ${activeR.length} active</div></div></div>

    ${all.length>8?searchBar('dtSrch','Route, vehicle, city...'):''}
    <div id="dtSrch_list" style="margin-bottom:10px">
      ${activeR.length?activeR.sort((a,b)=>{ const order={short:0,breakdown:1,planned:2,inside:3,dock:4,loaded:5}; return (order[rSt(a)]??9)-(order[rSt(b)]??9); }).map(r=>{const v=rV(r);const s=(r.routeNo+' '+r.city+' '+(v?.number||'')+' '+(v?.vendor||'')).toLowerCase(); return routeRow(r).replace('<div style="border-bottom',`<div data-s="${s}" style="border-bottom`); }).join('')
        :'<div class="empty"><div class="empty-ic">✅</div><div class="empty-t">All routes departed</div></div>'}
      ${outR.length?outR.map(r=>{const v=rV(r);const s=(r.routeNo+' '+r.city+' '+(v?.number||'')+'').toLowerCase(); return routeRow(r).replace('<div style="border-bottom',`<div data-s="${s}" style="border-bottom`); }).join(''):''}
    </div>

    <div style="background:var(--sur);border:1px solid var(--org);border-radius:var(--r);padding:12px 13px">${co.map(routeRow).join('')}</div>`:''}
    <div style="height:20px"></div>`;
}
